:root {
  --bg: #0F0F13;

.streak-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#FB923C,#F59E0B);color:#78350F;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}

.progress-bar{height:6px;border-radius:3px;background:var(--surface2);overflow:hidden}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}

<script type="text/babel" data-type="module">
const { useState, useEffect, useRef } = React;

// ─── Storage ───
const S = {
  get: (k, d) => { try { const v = localStorage.getItem("reps_" + k); return v ? JSON.parse(v) : d; } catch { return d; } },
  set: (k, v) => { try { localStorage.setItem("reps_" + k, JSON.stringify(v)); } catch {} },
};

// ─── IndexedDB for photos (survives localStorage limits) ───
const PhotoDB = {
  _db: null,
  open() {
    return new Promise((resolve, reject) => {
      if (this._db) return resolve(this._db);
      const req = indexedDB.open("reps_photos", 1);
      req.onupgradeneeded = e => { e.target.result.createObjectStore("photos", { keyPath: "id" }); };
      req.onsuccess = e => { this._db = e.target.result; resolve(this._db); };
      req.onerror = () => reject(req.error);
    });
  },
  async getAll() {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction("photos", "readonly");
      const req = tx.objectStore("photos").getAll();
      req.onsuccess = () => resolve(req.result.sort((a, b) => b.date.localeCompare(a.date)));
      req.onerror = () => reject(req.error);
    });
  },
  async add(photo) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction("photos", "readwrite");
      tx.objectStore("photos").put(photo);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async remove(id) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction("photos", "readwrite");
      tx.objectStore("photos").delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async clear() {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction("photos", "readwrite");
      tx.objectStore("photos").clear();
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }
};

// ─── Progress Ring ───
const Ring = ({ pct, size = 60, stroke = 5, color = "var(--accent)" }) => {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (Math.min(pct, 100) / 100) * c;
  return React.createElement("svg", { width: size, height: size, style: { transform: "rotate(-90deg)" } },
    React.createElement("circle", { cx: size/2, cy: size/2, r, fill: "none", stroke: "var(--surface2)", strokeWidth: stroke }),
    React.createElement("circle", { cx: size/2, cy: size/2, r, fill: "none", stroke: color, strokeWidth: stroke,
      strokeDasharray: c, strokeDashoffset: offset, strokeLinecap: "round",
      style: { transition: "stroke-dashoffset 0.8s ease" } })
  );
};
