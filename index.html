<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="REPS"/>
<meta name="theme-color" content="#F4EFE3"/>
<meta name="description" content="REPS — A calm practice for body and mind."/>
<title>REPS</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
/* Calm, friendly palette — Avatar elements rotate per page via [data-theme] */
:root {
  /* Air — default (Home, Settings, Onboarding) */
  --bg: #F4EFE3;
  --bg2: #EDE5D2;
  --surface: #FFFFFF;
  --surface2: #F8F3E7;
  --surface3: #EDE5D2;
  --line: #E4DCC8;
  --text: #2D2920;
  --text2: #6E6557;
  --text3: #A39A89;
  --accent: #7FA9C9;        /* sky blue */
  --accent-deep: #5A8AAD;
  --accent-glow: rgba(127,169,201,0.28);
  --accent-soft: rgba(127,169,201,0.12);
  --warm: #E89B5F;          /* monk orange */
  --green: #6B8E55;
  --orange: #E89B5F;
  --red: #C26B5A;
  --pink: #D49AAA;
  --blue: #7FA9C9;
  --gold: #C99548;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --shadow: 0 4px 18px rgba(45,41,32,0.06);
  --shadow-lift: 0 8px 28px rgba(45,41,32,0.10);
  --font-display: 'Fraunces', Georgia, serif;
  --font: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
/* Earth — Workouts, Wallet (grounded greens) */
[data-theme="earth"] {
  --bg: #EFE7D6;
  --bg2: #E5DCC6;
  --surface: #FBF7EC;
  --surface2: #F2EAD6;
  --surface3: #E7DCC2;
  --line: #DCD0B4;
  --text: #2E2820;
  --accent: #6B8E55;
  --accent-deep: #4F6E3D;
  --accent-glow: rgba(107,142,85,0.28);
  --accent-soft: rgba(107,142,85,0.12);
}
/* Fire (Iroh tea-shop) — Active Workout */
[data-theme="fire"] {
  --bg: #F5EDDD;
  --bg2: #EFE3C8;
  --surface: #FFFAF0;
  --surface2: #F7EFDB;
  --surface3: #ECDFBE;
  --line: #E0CFA4;
  --text: #2A1614;
  --accent: #B0463A;        /* warm tea red, calm not harsh */
  --accent-deep: #8A2F25;
  --accent-glow: rgba(176,70,58,0.25);
  --accent-soft: rgba(176,70,58,0.10);
  --gold: #C99548;
}
/* Water — Progress, Stats */
[data-theme="water"] {
  --bg: #EEF4F6;
  --bg2: #DCE7EC;
  --surface: #FFFFFF;
  --surface2: #F1F7F9;
  --surface3: #DDE8EC;
  --line: #C9D7DC;
  --text: #1B2F3A;
  --text2: #51697A;
  --text3: #93A6B2;
  --accent: #3A7B8C;
  --accent-deep: #265869;
  --accent-glow: rgba(58,123,140,0.25);
  --accent-soft: rgba(58,123,140,0.10);
}
/* Spirit — Photos */
[data-theme="spirit"] {
  --bg: #EBE7E8;
  --bg2: #DDD7E0;
  --surface: #F8F5F8;
  --surface2: #EFEAF0;
  --surface3: #DFD7E2;
  --line: #CDC4D0;
  --text: #2D2740;
  --text2: #5B5273;
  --text3: #9489A0;
  --accent: #8A7AAD;
  --accent-deep: #6C5C90;
  --accent-glow: rgba(138,122,173,0.25);
  --accent-soft: rgba(138,122,173,0.12);
}
/* Optional twilight (dark) versions — softer than the old pitch black */
[data-theme-mode="dark"] {
  --bg: #1F1B16;
  --bg2: #16130E;
  --surface: #2A2520;
  --surface2: #322B25;
  --surface3: #3D352C;
  --line: #463D32;
  --text: #F1EBDF;
  --text2: #C6BCAA;
  --text3: #8A7F6D;
  --shadow: 0 4px 18px rgba(0,0,0,0.35);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;overscroll-behavior:none;overflow-x:hidden;transition:background .8s ease, color .4s ease}

/* ============ CALM BACKGROUND ============ */
/* One soft stage with a gentle gradient and a few drifting shapes.
   Color shifts with the active theme; no harsh contrasts. */
.bg-stage{
  position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
  isolation:isolate;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, var(--accent-soft), transparent 70%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
  transition:background .8s ease;
}
.sky-tint{
  position:absolute; inset:0; pointer-events:none;
  background: radial-gradient(ellipse 60% 30% at 50% 90%, var(--accent-soft), transparent 70%);
}
.cloud{
  position:absolute; pointer-events:none;
  background:radial-gradient(ellipse at center, rgba(255,255,255,0.6), rgba(255,255,255,0) 70%);
  filter:blur(8px);
  animation: drift-cloud 60s linear infinite;
}
.cloud.c1{width:340px;height:120px;top:8%;left:-20%;animation-duration:80s}
.cloud.c2{width:220px;height:80px;top:22%;left:-15%;animation-duration:110s;animation-delay:-30s;opacity:.6}
.cloud.c3{width:280px;height:100px;top:48%;left:-25%;animation-duration:95s;animation-delay:-60s;opacity:.45}
@keyframes drift-cloud{from{transform:translateX(0)}to{transform:translateX(150vw)}}
[data-theme-mode="dark"] .cloud{background:radial-gradient(ellipse at center, rgba(255,250,235,0.10), rgba(255,250,235,0) 70%)}

.petal{
  position:absolute; width:8px; height:8px; border-radius:50% 0;
  background:var(--warm,#E89B5F); opacity:0.35;
  animation: petal-fall 14s linear infinite;
  pointer-events:none;
}
.petal.p1{left:18%;animation-delay:0s}
.petal.p2{left:46%;animation-delay:-4s}
.petal.p3{left:78%;animation-delay:-9s}
.petal.p4{left:62%;animation-delay:-12s}
@keyframes petal-fall{
  0%{transform:translateY(-20px) rotate(0deg); opacity:0}
  10%{opacity:.35}
  90%{opacity:.25}
  100%{transform:translateY(110vh) rotate(540deg); opacity:0}
}
[data-theme="water"] .petal{background:#8FB8C9}
[data-theme="earth"] .petal{background:#A8755A}
[data-theme="fire"] .petal{background:#C99548}
[data-theme="spirit"] .petal{background:#B5A6D0}

.horizon{
  position:absolute; left:0; right:0; bottom:0; height:30vh;
  pointer-events:none; opacity:.5;
}
.horizon svg{position:absolute; bottom:0; left:0; width:100%; height:100%; display:block}

.grain{
  position:absolute; inset:0; pointer-events:none; opacity:.06;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

.divider-soft{
  height:1px; width:100%;
  background:linear-gradient(90deg, transparent, var(--line), transparent);
  margin:8px 0;
}

#app{max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative;z-index:2}
.page{flex:1;padding:20px 16px 120px;animation:fadeUp .5s cubic-bezier(.2,.8,.2,1); position:relative}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes checkmark{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes softPulse{0%,100%{box-shadow:0 0 0 0 var(--accent-glow), 0 6px 18px var(--accent-glow)}50%{box-shadow:0 0 0 12px transparent, 0 6px 18px var(--accent-glow)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}

/* ============ CARDS ============ */
.card{
  background:var(--surface);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
  border:1px solid var(--line);
  position:relative;
  transition:transform .18s ease, box-shadow .25s ease, border-color .2s;
}
.card:active{transform:scale(.995)}
.card-tight{padding:13px}
.card-iron{
  background:var(--surface);
  border:1px solid var(--line);
  position:relative; overflow:hidden;
}
.card-hot{
  background:linear-gradient(160deg, var(--surface) 0%, var(--accent-soft) 120%);
  border:1px solid var(--accent-soft);
  box-shadow:var(--shadow-lift);
  position:relative; overflow:hidden;
}
.card-hot::before{
  content:""; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity:.45;
}

/* ============ BUTTONS ============ */
.btn{
  font-family:var(--font);
  font-weight:600;
  letter-spacing:.2px;
  border:none;
  border-radius:14px;
  padding:14px 22px;
  font-size:14px;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:transform .15s ease, box-shadow .2s ease, background .2s ease;
  position:relative;
  overflow:hidden;
}
.btn:active{transform:scale(.985)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{
  background:var(--accent);
  color:#fff;
  box-shadow:0 4px 14px var(--accent-glow);
}
.btn-primary:hover{background:var(--accent-deep)}
.btn-primary:active{box-shadow:0 2px 8px var(--accent-glow)}
.btn-secondary{background:var(--surface2); color:var(--text); border:1px solid var(--line)}
.btn-secondary:hover{background:var(--surface3)}
.btn-ghost{background:transparent;color:var(--text2);padding:8px 12px}
.btn-ghost:hover{color:var(--text)}
.btn-sm{padding:10px 14px;font-size:13px}
.btn-xs{padding:6px 10px;font-size:11px}
.btn-full{width:100%}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red);border-radius:14px}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-green{
  background:#6B8E55;
  color:#fff;
  box-shadow:0 4px 14px rgba(107,142,85,0.25);
}
.btn-green:hover{background:#5A7846}
.btn-massive{
  padding:20px;
  font-size:16px;
  letter-spacing:.3px;
  border-radius:18px;
  animation:softPulse 3.4s ease-in-out infinite;
}

/* ============ CHIPS / INPUTS / LABELS ============ */
.chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:8px 14px;border-radius:999px;
  font-size:12px;font-weight:500;letter-spacing:.2px;
  background:var(--surface2);
  color:var(--text2);
  cursor:pointer;transition:all .15s;
  border:1px solid var(--line);
  font-family:var(--font);
}
.chip:hover{border-color:var(--accent-soft)}
.chip.active{background:var(--accent-soft); color:var(--accent-deep); border-color:var(--accent)}
.chip-sm{padding:6px 11px;font-size:11px}
.input{
  width:100%;font-family:var(--font);
  padding:13px 14px;border-radius:12px;
  border:1px solid var(--line); background:var(--surface);
  color:var(--text);font-size:14px;outline:none;transition:border-color .18s, box-shadow .18s;
}
.input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
.input-sm{padding:9px 11px;font-size:13px}
.label{
  font-family:var(--font);
  font-size:11px;color:var(--text3);
  font-weight:500;letter-spacing:.3px;margin-bottom:6px;
  text-transform:uppercase;
}

/* ============ NAV ============ */
.nav{
  position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
  width:calc(100% - 20px);max-width:410px;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:22px;
  box-shadow:var(--shadow-lift);
  display:flex;justify-content:space-around;
  padding:10px 0 max(10px,env(safe-area-inset-bottom));
  z-index:100;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:6px 8px;border:none;background:none;
  color:var(--text3);
  font-family:var(--font);
  font-size:10px;letter-spacing:.2px;font-weight:500;
  cursor:pointer;transition:color .15s;
  position:relative;
}
.nav-item.active{color:var(--accent)}
.nav-item.active::before{
  content:""; position:absolute; top:-8px; left:50%; transform:translateX(-50%);
  width:22px; height:2px; background:var(--accent); border-radius:2px;
}

/* ============ EXERCISES ============ */
.exercise-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 0;border-bottom:1px solid var(--line);
}
.exercise-row:last-child{border-bottom:none}
.check-circle{
  width:36px;height:36px;border-radius:50%;
  border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .2s;
  background:var(--surface);
}
.check-circle:hover{border-color:var(--accent)}
.check-circle.done{
  background:var(--accent); border-color:var(--accent);
  box-shadow:0 0 0 4px var(--accent-soft);
  animation:checkmark .4s cubic-bezier(.2,.8,.2,1);
}
.check-circle-sm{width:24px;height:24px;border-width:1.5px}

/* ============ MODAL ============ */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(45,41,32,0.45);
  backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn .25s ease;
}
.modal{
  width:100%;max-width:430px;
  background:var(--surface);
  border-top:1px solid var(--line);
  border-radius:24px 24px 0 0;
  padding:24px 20px max(24px,env(safe-area-inset-bottom));
  max-height:85vh;overflow-y:auto;
  animation:slideUp .35s cubic-bezier(.2,.8,.2,1);
  position:relative;
  box-shadow:0 -10px 30px rgba(45,41,32,0.12);
}
.modal-tall{max-height:92vh}
.modal-handle{
  width:44px;height:4px;background:var(--surface3);
  border-radius:2px;margin:0 auto 16px;
}

/* ============ BADGES ============ */
.streak-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--warm,#E89B5F);
  color:#fff;
  padding:5px 11px;
  border-radius:999px;
  font-family:var(--font);
  font-size:12px;font-weight:600;letter-spacing:.2px;
}
.pr-badge{
  display:inline-flex;align-items:center;gap:3px;
  background:var(--gold);
  color:#fff;
  padding:3px 9px;
  border-radius:999px;
  font-family:var(--font);
  font-size:10px;font-weight:600;letter-spacing:.3px;
}

/* ============ TIMER ============ */
.timer-display{
  font-family:var(--font-display);
  font-size:84px;font-weight:500;
  letter-spacing:-2px;text-align:center;
  font-variant-numeric:tabular-nums;
  color:var(--text);
  line-height:1;
}

/* ============ PROGRESS ============ */
.progress-bar{height:6px;border-radius:999px;background:var(--surface2);overflow:hidden;position:relative}
.progress-bar-fill{height:100%;border-radius:999px;transition:width .8s ease; background:var(--accent)}

/* ============ CALENDAR ============ */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{
  aspect-ratio:1;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font);font-size:12px;color:var(--text3);
  background:var(--surface2);
  border:1px solid var(--line);
  transition:all .2s;
}
.cal-cell.done{
  background:var(--accent);
  color:#fff;font-weight:600;
  border-color:var(--accent);
}
.cal-cell.today{border:2px solid var(--accent); color:var(--accent)}
.cal-cell.rest{opacity:.5}

.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.photo-cell{aspect-ratio:3/4;border-radius:var(--radius);background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;transition:transform .2s; border:1px solid var(--line)}
.photo-cell:active{transform:scale(.97)}
.photo-cell img{width:100%;height:100%;object-fit:cover}

/* ============ TYPE ============ */
h1{font-family:var(--font-display);font-size:34px;font-weight:500;letter-spacing:-0.5px;line-height:1.1}
h2{font-family:var(--font-display);font-size:24px;font-weight:500;letter-spacing:-0.2px;line-height:1.15}
h3{font-family:var(--font);font-size:16px;font-weight:600;letter-spacing:.1px}
.display-xl{font-family:var(--font-display);font-size:64px;font-weight:500;letter-spacing:-2px;line-height:1}
.mono{font-family:var(--font-mono)}

/* ============ HELPERS ============ */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.items-start{align-items:flex-start}.items-end{align-items:flex-end}.justify-between{justify-content:space-between}.justify-center{justify-content:center}.flex-wrap{flex-wrap:wrap}.flex-1{flex:1}
.gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.w-full{width:100%}.text-center{text-align:center}.text-right{text-align:right}.text-left{text-align:left}
.text-sm{font-size:13px}.text-xs{font-size:11px}.text-muted{color:var(--text2)}.text-dim{color:var(--text3)}.text-accent{color:var(--accent)}.text-gold{color:var(--gold)}.text-green{color:#6B8E55}.text-red{color:var(--red)}
.font-bold{font-weight:700}.font-medium{font-weight:500}.font-semibold{font-weight:600}
.upper{letter-spacing:.2px}
.tab-num{font-variant-numeric:tabular-nums}

/* ============ QUICK ACTIONS ============ */
.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.quick-action{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:14px 6px;
  background:var(--surface);
  border-radius:16px;border:1px solid var(--line);
  cursor:pointer;
  font-family:var(--font);
  font-size:11px;letter-spacing:.1px;
  color:var(--text2);font-weight:500;
  transition:all .15s;
}
.quick-action:hover{border-color:var(--accent-soft);background:var(--surface2)}
.quick-action:active{transform:scale(.97)}
.qa-icon{
  width:36px;height:36px;border-radius:12px;
  background:var(--accent-soft);
  border:1px solid var(--accent-soft);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);
}

/* ============ STATS ============ */
.stat-card{
  background:var(--surface);
  border-radius:16px;padding:14px;
  display:flex;flex-direction:column;gap:4px;
  border:1px solid var(--line);
  position:relative;
}
.stat-value{font-family:var(--font-display);font-size:30px;font-weight:500;letter-spacing:-0.5px;line-height:1.05;font-variant-numeric:tabular-nums;color:var(--text)}
.stat-label{font-family:var(--font);font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.1px;margin-top:6px;text-transform:uppercase}

/* ============ TABS ============ */
.tab-bar{display:flex;gap:0;background:var(--surface2);border-radius:14px;padding:4px;border:1px solid var(--line)}
.tab{flex:1;padding:9px;border:none;background:transparent;color:var(--text3);font-family:var(--font);font-size:13px;font-weight:500;letter-spacing:.1px;border-radius:10px;cursor:pointer;transition:all .15s}
.tab.active{background:var(--surface); color:var(--accent); box-shadow:var(--shadow)}

.rest-timer-bar{
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:400px;
  background:var(--surface);
  border:1px solid var(--accent-soft);
  border-radius:18px;padding:12px 14px;
  display:flex;align-items:center;justify-content:space-between;
  z-index:99;
  box-shadow:var(--shadow-lift);
  animation:slideUp .3s cubic-bezier(.2,.8,.2,1);
}

/* ============ QUOTES ============ */
.quote-card{
  position:relative;padding:22px;
  background:var(--surface);
  border:1px solid var(--line);
  border-left:3px solid var(--accent);
  border-radius:18px;
  overflow:hidden;
  margin-bottom:14px;
}
.quote-card::before{
  content:"\201C";

<script>
// Surface any early script errors directly in #app so we don't stare at an empty shell.
window.addEventListener('error', (e) => {
  try {
    const app = document.getElementById('app');
    if (!app) return;
    const msg = (e.message || e.error && e.error.message || e.type) + '';
    const where = (e.filename || '') + ':' + (e.lineno || '?') + ':' + (e.colno || '?');
    const stack = (e.error && e.error.stack) || '';
    app.innerHTML = '<pre style="color:#2D2920;background:#F8F3E7;border:1px solid #E4DCC8;margin:20px;padding:16px;border-radius:14px;font:12px/1.4 \'JetBrains Mono\',monospace;white-space:pre-wrap;word-break:break-word;position:relative;z-index:2">REPS — startup error\n\n' +
      msg.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])) + '\n' + where + '\n\n' + stack.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])) + '</pre>';
  } catch {}
});
window.addEventListener('unhandledrejection', (e) => {
  try {
    const app = document.getElementById('app');
    if (!app || app.children.length > 0) return;
    app.innerHTML = '<pre style="color:#2D2920;background:#F8F3E7;border:1px solid #E4DCC8;margin:20px;padding:16px;border-radius:14px;font:12px/1.4 monospace;white-space:pre-wrap;position:relative;z-index:2">REPS — unhandled rejection\n\n' + String(e.reason && e.reason.message || e.reason).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])) + '</pre>';
  } catch {}
});

const DB = {
  _db: null,
  open() {
    return new Promise((resolve, reject) => {
      if (this._db) return resolve(this._db);
      const req = indexedDB.open("reps_app", 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains("sessions")) db.createObjectStore("sessions", { keyPath: "id" });
        if (!db.objectStoreNames.contains("catalog")) db.createObjectStore("catalog", { keyPath: "id" });
        if (!db.objectStoreNames.contains("meta")) db.createObjectStore("meta", { keyPath: "key" });
      };
      req.onsuccess = e => { this._db = e.target.result; resolve(this._db); };
      req.onerror = () => reject(req.error);
    });
  },
  async all(store) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const req = db.transaction(store, "readonly").objectStore(store).getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  },
  async put(store, obj) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(store, "readwrite");
      tx.objectStore(store).put(obj);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async putMany(store, arr) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(store, "readwrite");
      const os = tx.objectStore(store);
      arr.forEach(o => os.put(o));
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
  async clear(store) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(store, "readwrite");
      tx.objectStore(store).clear();
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  },
};

async function loadCatalog() {
  const cached = await DB.all("catalog").catch(() => []);
  if (cached.length) {
    fetch("exercises.json", { cache: "no-cache" }).then(r => r.ok && r.json()).then(fresh => {
      if (fresh && Array.isArray(fresh) && fresh.length) {
        DB.clear("catalog").then(() => DB.putMany("catalog", fresh));
      }
    }).catch(() => {});
    return cached;
  }
  try {
    const r = await fetch("exercises.json");
    const arr = await r.json();
    await DB.putMany("catalog", arr);
    return arr;
  } catch (err) {
    console.error("Catalog load failed", err);
    return [];
  }
}

function buildDefaultWorkouts(catalog) {
  const byId = Object.fromEntries(catalog.map(e => [e.id, e]));
  const byName = (name) => {
    const n = name.toLowerCase().replace(/[^a-z0-9]/g, "");
    return catalog.find(e => e.name.toLowerCase().replace(/[^a-z0-9]/g, "") === n);
  };
  const resolve = (name, fallbackType = "reps") => {
    const mapped = LEGACY_NAME_MAP[name];
    let ex = mapped && byId[mapped];
    if (!ex) ex = byName(name);
    if (ex) return { exerciseId: ex.id, name: ex.name, type: ex.type, catalogKnown: true };
    return { exerciseId: "custom_" + uid(), name, type: fallbackType, catalogKnown: false };
  };
  const mkItem = (name, sets, reps, weight = "BW", type = "reps", rest = 60) => {
    const r = resolve(name, type);
    return { id: uid(), exerciseId: r.exerciseId, name: r.name, sets, targetReps: reps, weight, type: r.type || type, rest, notes: "" };

  const ver = S.get("schemaVersion", 0);
  if (ver >= SCHEMA_VERSION) return;
  const oldHistory = S.get("history", []);
  if (oldHistory.length) {
    const sessions = oldHistory.map(hh => ({
      id: "hist_" + uid(), date: hh.date, workoutId: hh.workoutId, workoutName: hh.workoutName,
      status: "complete",
      items: (hh.exercises || []).map(e => ({
        exerciseId: e.id || ("legacy_" + (e.name || "").replace(/\s+/g, "_")),
        name: e.name, type: e.type || "reps",
        sets: e.done ? Array.from({ length: e.sets || 1 }, () => ({
          reps: e.type === "timed" ? 0 : (e.reps || 0),
          duration: e.type === "timed" ? (e.reps || 0) : 0,
          weight: parseWeight(e.weight), weightLabel: e.weight || "BW",
          done: true, rpe: null, notes: e.notes || "",
        })) : [],
        notes: e.notes || "",
      })),
    }));
    await DB.putMany("sessions", sessions);
  }
  S.set("schemaVersion", SCHEMA_VERSION);
}

const Ring = ({ pct, size = 60, stroke = 5, color = "var(--accent)" }) => {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (Math.min(pct, 100) / 100) * c;
  return h("svg", { width: size, height: size, style: { transform: "rotate(-90deg)" } },
    h("circle", { cx: size/2, cy: size/2, r, fill: "none", stroke: "var(--surface2)", strokeWidth: stroke }),
    h("circle", { cx: size/2, cy: size/2, r, fill: "none", stroke: color, strokeWidth: stroke,
      strokeDasharray: c, strokeDashoffset: offset, strokeLinecap: "round",
      style: { transition: "stroke-dashoffset 0.8s ease", filter: "drop-shadow(0 0 4px " + color + ")" } })
  );
};

const Quote = ({ quote }) => h("div", { className: "quote-card" },

);

const Kicker = ({ children, color = "var(--accent)" }) => h("p", { style: { fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: 2.5, color, textTransform: "uppercase", marginBottom: 4 } }, "■  ", children);

// ═════════════════════════════════════════════════════════════════
// App root
// ═════════════════════════════════════════════════════════════════
function App() {
  const [catalog, setCatalog] = useState([]);
  const [catalogReady, setCatalogReady] = useState(false);
  const [onboarded, setOnboarded] = useState(S.get("onboarded", false));
  const [profile, setProfile] = useState(S.get("profile", { name: "", goal: "", setting: "Home", daysPerWeek: 4, equipment: ["bodyweight"] }));
  const [workouts, setWorkouts] = useState(S.get("workouts", []));
  const [schedule, setSchedule] = useState(S.get("schedule", DEFAULT_SCHEDULE));
  const [sessions, setSessions] = useState([]);
  const [bodyStats, setBodyStats] = useState(S.get("bodyStats", []));
  const [cardioLogs, setCardioLogs] = useState(S.get("cardioLogs", []));
  const [page, setPage] = useState("home");
  const [darkMode, setDarkMode] = useState(S.get("darkMode", false));
  const [modal, setModal] = useState(null);
  const [activeWorkout, setActiveWorkout] = useState(null);
  // Wallet
  const [walletTxns, setWalletTxns] = useState(S.get("walletTxns", []));
  const [walletSyncing, setWalletSyncing] = useState(false);
  const walletBalance = useMemo(() => walletTxns.reduce((t, x) => t + Number(x.amount || 0), 0), [walletTxns]);
  // Auth — optional; if signed in, wallet syncs to shared Supabase with SpendLens
  const [authUser, setAuthUser] = useState(null);
  // Reward rules (defaults target ~$120/month for 4x/week trainee, adjustable)
  const [rewardConfig, setRewardConfig] = useState(S.get("rewardConfig", DEFAULT_REWARDS));

  useEffect(() => {
    // Each step is independent — a failure in one shouldn't block the UI from mounting.
    (async () => {
      try { await migrateV1toV2(); } catch (e) { console.error("migrate failed", e); }
      let cat = [];
      try { cat = await loadCatalog(); } catch (e) { console.error("catalog load failed", e); }
      setCatalog(cat);
      try {
        const sess = await DB.all("sessions");
        setSessions(sess.sort((a,b) => a.date.localeCompare(b.date)));
      } catch (e) { console.error("sessions load failed", e); }
      if (cat.length && !S.get("workouts", null)) {
        try { setWorkouts(buildDefaultWorkouts(cat)); } catch (e) { console.error("seed workouts failed", e); }
      }
      setCatalogReady(true);
    })();
  }, []);

  useEffect(() => { S.set("onboarded", onboarded); }, [onboarded]);
  useEffect(() => { S.set("profile", profile); }, [profile]);
  useEffect(() => { S.set("workouts", workouts); }, [workouts]);
  useEffect(() => { S.set("schedule", schedule); }, [schedule]);
  useEffect(() => { S.set("bodyStats", bodyStats); }, [bodyStats]);
  useEffect(() => { S.set("cardioLogs", cardioLogs); }, [cardioLogs]);
  useEffect(() => { S.set("darkMode", darkMode); }, [darkMode]);
  useEffect(() => { S.set("walletTxns", walletTxns); }, [walletTxns]);
  useEffect(() => { S.set("rewardConfig", rewardConfig); }, [rewardConfig]);

  // Per-page Avatar theme. Each page sets its element on the document root.
  useEffect(() => {
    const themeByPage = { home: "air", workouts: "earth", "active-workout": "fire", progress: "water", stats: "water", photos: "spirit", wallet: "earth", settings: "air" };
    const el = document.body;
    el.setAttribute("data-theme", themeByPage[page] || "air");
    el.setAttribute("data-theme-mode", darkMode ? "dark" : "light");
    document.querySelector("#app").setAttribute("data-theme", themeByPage[page] || "air");
    // Match the iOS status bar to the page accent
    const meta = document.querySelector('meta[name="theme-color"]');
    const colors = { air: "#F4EFE3", earth: "#EFE7D6", fire: "#F5EDDD", water: "#EEF4F6", spirit: "#EBE7E8" };
    if (meta) meta.setAttribute("content", colors[themeByPage[page]] || "#F4EFE3");
  }, [page, darkMode]);

  // Auth — hydrate user on mount and listen for changes
  useEffect(() => {
    const client = getSB();
    if (!client) return;
    client.auth.getSession().then(({ data }) => { setAuthUser(data.session?.user || null); });
    const { data: sub } = client.auth.onAuthStateChange((_event, session) => { setAuthUser(session?.user || null); });
    return () => sub.subscription.unsubscribe();
  }, []);

  // When signed in, hydrate wallet from cloud (cloud is the source of truth)
  useEffect(() => {
    if (!authUser) return;
    const client = getSB();
    if (!client) return;
    setWalletSyncing(true);
    client.from("guilt_free_wallet").select("*").order("occurred_at", { ascending: false }).limit(500)
      .then(({ data, error }) => {
        if (error) { console.warn("wallet fetch", error); return; }
        const rows = (data || []).map(r => ({
          id: r.id, amount: Number(r.amount), source: r.source,
          description: r.description, reference_id: r.reference_id,
          occurred_at: r.occurred_at,
        }));
        setWalletTxns(rows);
      })
      .finally(() => setWalletSyncing(false));
  }, [authUser]);

  const signInGoogle = async () => {
    const client = getSB();
    if (!client) { alert("Auth client failed to load. Check your connection."); return; }
    const { error } = await client.auth.signInWithOAuth({ provider: "google", options: { redirectTo: window.location.origin + window.location.pathname } });
    if (error) alert("Sign-in failed: " + error.message);
  };

  const signOut = async () => {
    const client = getSB();
    if (!client) return;
    await client.auth.signOut();
    setAuthUser(null);
  };

  const depositReward = useCallback(async (amount, source, description, reference_id) => {
    if (!amount) return;
    const occurred_at = new Date().toISOString();
    const local = { id: "tx_" + uid(), amount: Number(amount), source, description, reference_id: reference_id || null, occurred_at };
    setWalletTxns(prev => [local, ...prev]);
    const client = getSB();
    if (!client || !authUser) return; // local-only when signed out
    const row = { user_id: authUser.id, amount: Number(amount), source, description, reference_id: reference_id || null, occurred_at };
    const { data, error } = await client.from("guilt_free_wallet").insert(row).select().single();
    if (error) {
      // Unique-index hit means we already synced this event; just clean up the optimistic row.
      if (error.code === "23505") { setWalletTxns(prev => prev.filter(t => t.id !== local.id)); return; }
      console.warn("wallet insert", error);
      return;
    }
    if (data) setWalletTxns(prev => prev.map(t => t.id === local.id ? { ...t, id: data.id } : t));
  }, [authUser]);

  const catalogById = useMemo(() => Object.fromEntries(catalog.map(e => [e.id, e])), [catalog]);
  const resolveItem = useCallback((item) => {
    const cat = catalogById[item.exerciseId];
    return cat ? { ...item, catalog: cat, name: cat.name, type: cat.type } : { ...item, catalog: null };
  }, [catalogById]);

  const getTodayWorkout = () => { const wid = schedule[dayName()]; return wid ? workouts.find(w => w.id === wid) : null; };
  const getTodayLabel = () => { const w = getTodayWorkout(); return w ? w.name : "REST DAY"; };

  const getWeeklyCompleted = () => {
    const now = new Date(); const s = new Date(now); s.setDate(now.getDate() - now.getDay()); s.setHours(0,0,0,0);
    return sessions.filter(x => x.status === "complete" && parseDate(x.date) >= s).length;
  };

  const getStreak = () => {
    if (!sessions.length) return 0;
    const dates = new Set(sessions.filter(x => x.status === "complete").map(x => x.date));
    let streak = 0; const d = new Date();
    const scheduledDays = Object.keys(schedule).filter(k => schedule[k]);
    for (let i = 0; i < 90; i++) {
      const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      const dn = DAYS[d.getDay()];
      if (scheduledDays.includes(dn)) {
        if (dates.has(ds)) streak++;
        else if (streak > 0) break;
      }
      d.setDate(d.getDate() - 1);
    }
    return streak;
  };

  const getTotalReps = () => sessions.reduce((t, s) =>
    t + (s.items || []).reduce((a, it) =>
      a + (it.sets || []).filter(x => x.done && it.type !== "timed").reduce((aa, x) => aa + (x.reps || 0), 0), 0), 0);

  const getCaloriesThisWeek = () => {
    const now = new Date(); const s = new Date(now); s.setDate(now.getDate() - now.getDay()); s.setHours(0,0,0,0);
    const wCals = sessions.filter(x => x.status === "complete" && parseDate(x.date) >= s).length * 220;
    const cCals = cardioLogs.filter(c => parseDate(c.date) >= s).reduce((a, c) => a + (c.calories || 0), 0);
    return wCals + cCals;
  };

  const prs = useMemo(() => {
    const out = {};
    for (const s of sessions) {
      if (s.status !== "complete") continue;
      for (const it of s.items || []) {
        const id = it.exerciseId;
        if (!out[id]) out[id] = { exerciseId: id, name: it.name, oneRm: 0, maxWeight: 0, maxReps: 0, topSet: null, date: s.date };
        for (const set of it.sets || []) {
          if (!set.done) continue;
          const w = set.weight || 0, r = set.reps || 0;
          const e1 = epley(w, r);
          if (e1 > out[id].oneRm) { out[id].oneRm = e1; out[id].date = s.date; }
          if (w > out[id].maxWeight) { out[id].maxWeight = w; out[id].topSet = { weight: w, reps: r, date: s.date }; }
          if (r > out[id].maxReps && w === 0) out[id].maxReps = r;
        }
      }
    }
    return out;
  }, [sessions]);

  const findLastSetsFor = (exerciseId) => {
    for (let i = sessions.length - 1; i >= 0; i--) {
      const s = sessions[i];
      if (s.status !== "complete") continue;
      const it = (s.items || []).find(x => x.exerciseId === exerciseId);
      if (it && it.sets && it.sets.length) return it.sets.filter(x => x.done);
    }
    return [];
  };

  const saveSession = async (sess) => {
    await DB.put("sessions", sess);
    setSessions(prev => {
      const idx = prev.findIndex(x => x.id === sess.id);
      const next = idx >= 0 ? [...prev.slice(0, idx), sess, ...prev.slice(idx+1)] : [...prev, sess];
      return next.sort((a,b) => a.date.localeCompare(b.date));
    });
  };

  const startWorkout = (workout) => {
    const session = {
      id: "sess_" + uid(), date: todayStr(), workoutId: workout.id, workoutName: workout.name,
      focus: workout.focus || "", status: "active",
      items: workout.items.map(it => {
        const cat = catalogById[it.exerciseId];
        const prev = findLastSetsFor(it.exerciseId);
        return {
          exerciseId: it.exerciseId,
          name: cat ? cat.name : it.name,
          type: cat ? cat.type : (it.type || "reps"),
          sets: Array.from({ length: it.sets || 3 }, (_, i) => ({
            targetReps: it.targetReps || (it.type === "timed" ? 30 : 10),
            reps: 0, duration: 0,
            weight: prev[i] ? prev[i].weight : parseWeight(it.weight || ""),
            weightLabel: prev[i] ? (prev[i].weight === 0 ? "BW" : prev[i].weight + " lb") : (it.weight || "BW"),
            done: false, rpe: null, notes: "",
          })),
          rest: it.rest || 60, notes: it.notes || "",
        };
      }),
    };
    setActiveWorkout(session);
    setPage("active-workout");
  };

  const completeWorkout = async () => {
    if (!activeWorkout) return;
    const finished = { ...activeWorkout, status: "complete" };
    await saveSession(finished);

    // Reward math — snapshot of state BEFORE this workout was saved, so we can
    // detect what changed. Streak/weekly use a recomputed view that includes
    // today's session.
    const cfg = rewardConfig || DEFAULT_REWARDS;
    const sid = finished.id;
    const earned = [];

    // 1. Base reward
    if (cfg.workout > 0) earned.push({ amount: cfg.workout, source: "workout", description: finished.workoutName, reference_id: sid });

    // 2. Streak bonus — uses the same scheduled-day streak logic but with the
    //    new session counted. Recompute inline to avoid stale closure.
    const completedDates = new Set(sessions.filter(x => x.status === "complete").map(x => x.date).concat([finished.date]));
    const scheduledDays = Object.keys(schedule).filter(k => schedule[k]);
    let streakNow = 0;
    {
      const d = new Date();
      for (let i = 0; i < 90; i++) {
        const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        const dn = DAYS[d.getDay()];
        if (scheduledDays.includes(dn)) {
          if (completedDates.has(ds)) streakNow++;
          else if (streakNow > 0) break;
        }
        d.setDate(d.getDate() - 1);
      }
    }
    const streakBonus = Math.min(streakNow * cfg.streakDay, cfg.streakCap);
    if (streakBonus > 0) earned.push({ amount: streakBonus, source: "streak_bonus", description: `${streakNow}-day streak`, reference_id: sid });

    // 3. Weekly goal — count completed workouts in the current week incl. today
    const target = profile.daysPerWeek || 4;
    const weekStart = new Date(); weekStart.setDate(weekStart.getDate() - weekStart.getDay()); weekStart.setHours(0,0,0,0);
    const thisWeekDone = [...sessions, finished].filter(x => x.status === "complete" && parseDate(x.date) >= weekStart).length;
    const weeklyAlreadyClaimed = walletTxns.some(t => t.source === "weekly_goal" && t.reference_id && parseDate(t.reference_id.replace(/^wk_/, "")) >= weekStart);
    if (thisWeekDone >= target && !weeklyAlreadyClaimed && cfg.weeklyGoal > 0) {
      const wkRef = "wk_" + todayStr();
      earned.push({ amount: cfg.weeklyGoal, source: "weekly_goal", description: `Hit weekly goal (${target}×)`, reference_id: wkRef });
    }

    // 4. PR bonus — compare new sets to existing PRs (prs was computed before
    //    this save, so any oneRm we beat in `finished` is a new PR).
    if (cfg.pr > 0) {
      const seen = new Set();
      for (const it of finished.items || []) {
        const oldPR = (prs[it.exerciseId] && prs[it.exerciseId].oneRm) || 0;
        let newPR = 0;
        for (const set of it.sets || []) {
          if (!set.done) continue;
          const v = epley(set.weight || 0, set.reps || 0);
          if (v > newPR) newPR = v;
        }
        if (newPR > oldPR && newPR > 0 && !seen.has(it.exerciseId)) {
          seen.add(it.exerciseId);
          earned.push({ amount: cfg.pr, source: "pr_bonus", description: `New PR · ${it.name}`, reference_id: sid + ":" + it.exerciseId });
        }
      }
    }

    for (const r of earned) { depositReward(r.amount, r.source, r.description, r.reference_id); }

    setActiveWorkout(null);
    const total = earned.reduce((a, r) => a + r.amount, 0);
    if (total > 0) {
      setModal(h(RewardSummaryModal, { earned, total, onClose: () => { setModal(null); setPage("home"); } }));
    } else {
      setPage("home");
    }
  };

  const handleReset = async () => {

// ═════════════════════════════════════════════════════════════════
// Onboarding
// ═════════════════════════════════════════════════════════════════
function Onboarding({ profile, setProfile, onComplete }) {
  const [step, setStep] = useState(0);
  const [name, setName] = useState(profile.name);
  const [goal, setGoal] = useState(profile.goal);
  const [setting, setSetting] = useState(profile.setting);
  const [days, setDays] = useState(profile.daysPerWeek);
  const [equipment, setEquipment] = useState(profile.equipment || ["bodyweight"]);

  const finish = () => { setProfile({ name, goal, setting, daysPerWeek: days, equipment }); onComplete(); };
  const toggleEquip = (e) => setEquipment(eq => eq.includes(e) ? eq.filter(x => x !== e) : [...eq, e]);

  const frame = (children) => h("div", { className: "onboard" },
    h("div", { style: { animation: "fadeUp .5s cubic-bezier(.2,.8,.2,1)" } }, children));

  if (step === 0) return frame([
    h("p", { key: "k", className: "kicker" }, "Welcome"),
    h("div", { key: "w", className: "wordmark", style: { fontSize: 80, marginBottom: 8 } }, "reps"),
    h("p", { key: "t", style: { fontFamily: "var(--font-display)", fontSize: 22, fontStyle: "italic", letterSpacing: 0, lineHeight: 1.3, marginBottom: 12, color: "var(--text)" } }, "A calm practice for body and mind."),
    h("p", { key: "d", className: "text-muted", style: { fontSize: 15, lineHeight: 1.65, marginBottom: 28 } }, "Show up at your own pace. Track your sessions, watch your strength grow, and earn a little reward to spend on something nice when you do."),
    h("div", { key: "h", className: "divider-soft mb-3" }),
    h("button", { key: "b", className: "btn btn-primary btn-full btn-massive", onClick: () => setStep(1) }, "Begin"),
    h("p", { key: "s", className: "text-center text-dim text-xs mt-3", style: { letterSpacing: .2 } }, "Patience is a great quality. — Iroh"),
  ]);

  const stepHeader = (n, title, sub) => [
    h("p", { key: "k", className: "kicker" }, "Step " + n + " of 5"),
    h("h2", { key: "h", className: "mb-1" }, title),
    h("p", { key: "s", className: "text-muted mb-4" }, sub),
  ];

  if (step === 1) return frame([
    ...stepHeader(1, "What's your name?", "We'd love to greet you properly."),
    h("input", { key: "i", className: "input", placeholder: "Your name", value: name, onChange: e => setName(e.target.value), autoFocus: true, style: { fontSize: 18, padding: 18, fontFamily: "var(--font-display)" } }),
    h("button", { key: "b", className: "btn btn-primary btn-full mt-4", disabled: !name.trim(), onClick: () => setStep(2), style: { padding: 16 } }, "Next ", h(Icon, { name: "arrow", size: 16, color: "#fff" })),
  ]);

  if (step === 2) return frame([
    ...stepHeader(2, "What are you after?", "Pick the one closest to where you are."),
    h("div", { key: "g", className: "flex flex-col gap-2" },
      GOALS.map(g => h("button", { key: g, className: "card flex items-center gap-3", style: { cursor: "pointer", padding: 16, borderColor: goal === g ? "var(--accent)" : "var(--line)", background: goal === g ? "var(--accent-soft)" : "var(--surface)" }, onClick: () => setGoal(g) },
        h("div", { style: { width: 40, height: 40, borderRadius: 12, background: goal === g ? "var(--accent)" : "var(--surface2)", display: "flex", alignItems: "center", justifyContent: "center" } },
          h(Icon, { name: g === "Build Muscle" ? "dumbbell" : g === "Lose Weight" ? "flame" : g === "Improve Fitness" ? "zap" : "target", size: 20, color: goal === g ? "#fff" : "var(--text3)" })),
        h("span", { style: { fontFamily: "var(--font-display)", fontSize: 17, fontWeight: 500, color: goal === g ? "var(--accent-deep)" : "var(--text)" } }, g)))),
    h("button", { key: "b", className: "btn btn-primary btn-full mt-4", disabled: !goal, onClick: () => setStep(3), style: { padding: 16 } }, "Next ", h(Icon, { name: "arrow", size: 16, color: "#fff" })),
  ]);

  if (step === 3) return frame([
    ...stepHeader(3, "Where do you train?", "We'll tailor the exercises to your space."),
    h("div", { key: "o", className: "flex gap-2" },
      SETTINGS_OPTIONS.map(s => h("button", { key: s, style: { flex: 1, padding: "20px 10px", borderRadius: 14, fontFamily: "var(--font)", fontSize: 15, fontWeight: 500, cursor: "pointer", background: setting === s ? "var(--accent)" : "var(--surface2)", color: setting === s ? "#fff" : "var(--text2)", border: "1px solid " + (setting === s ? "var(--accent)" : "var(--line)") }, onClick: () => setSetting(s) }, s))),
    h("button", { key: "b", className: "btn btn-primary btn-full mt-4", onClick: () => setStep(4), style: { padding: 16 } }, "Next ", h(Icon, { name: "arrow", size: 16, color: "#fff" })),
  ]);

  if (step === 4) return frame([
    ...stepHeader(4, "What's available?", "Choose what you have. We'll match exercises to you."),
    h("div", { key: "g", className: "flex flex-wrap gap-2" },
      Object.entries(EQUIPMENT_LABELS).map(([k, v]) => h("button", { key: k, className: `chip ${equipment.includes(k) ? "active" : ""}`, style: { padding: 10 }, onClick: () => toggleEquip(k) }, v))),
    h("button", { key: "b", className: "btn btn-primary btn-full mt-4", onClick: () => setStep(5), style: { padding: 16 } }, "Next ", h(Icon, { name: "arrow", size: 16, color: "#fff" })),
  ]);

  return frame([
    ...stepHeader(5, "How often, gently?", "Pick a rhythm. You can always change it."),
    h("div", { key: "g", className: "flex gap-2" },
      [3,4,5,6].map(d => h("button", { key: d, style: { flex: 1, padding: "22px 6px", borderRadius: 14, fontFamily: "var(--font-display)", fontSize: 28, fontWeight: 500, cursor: "pointer", background: days === d ? "var(--accent)" : "var(--surface2)", color: days === d ? "#fff" : "var(--text2)", border: "1px solid " + (days === d ? "var(--accent)" : "var(--line)"), lineHeight: 1 }, onClick: () => setDays(d) },
        d, h("div", { style: { fontSize: 11, marginTop: 4, fontWeight: 500, fontFamily: "var(--font)" } }, "days")))),
    h("div", { key: "h", className: "divider-soft mt-4 mb-3" }),
    h("button", { key: "b", className: "btn btn-primary btn-full btn-massive", onClick: finish },
      h(Icon, { name: "heart", size: 18, color: "#fff" }), " Begin"),
  ]);
}

    h("div", { style: { display: "flex", justifyContent: "space-between", padding: "14px 4px", marginTop: 12 } },
      DAYS.map((d, i) => {
        const ds = new Date(); ds.setDate(ds.getDate() - (ds.getDay() - i));

// ═════════════════════════════════════════════════════════════════
function LibraryTab({ ctx, setModal }) {
  const [search, setSearch] = useState("");
  const [setting, setSetting] = useState("all");
  const [muscle, setMuscle] = useState("all");
  const [equipment, setEquipment] = useState("all");
  const [difficulty, setDifficulty] = useState("all");

  const filtered = useMemo(() => {
    const q = search.toLowerCase().trim();
    return ctx.catalog.filter(e => {
      if (setting !== "all" && !e.settings.includes(setting)) return false;
      if (muscle !== "all" && e.primary_muscle !== muscle && !(e.secondary_muscles || []).includes(muscle)) return false;
      if (equipment !== "all" && e.equipment !== equipment) return false;
      if (difficulty !== "all" && e.difficulty !== difficulty) return false;
      if (q && !e.name.toLowerCase().includes(q)) return false;
      return true;
    });
  }, [ctx.catalog, search, setting, muscle, equipment, difficulty]);

  return h("div", null,
    h("div", { className: "flex items-center gap-2 mb-3" },
      h(Icon, { name: "search", size: 16, color: "var(--text3)" }),
      h("input", { className: "input input-sm", placeholder: `Search ${ctx.catalog.length} exercises…`, value: search, onChange: e => setSearch(e.target.value) })),
    h("div", { className: "filter-row mb-2" },
      ["all","home","gym","hybrid"].map(s => h("button", { key: s, className: `chip ${setting === s ? "active" : ""}`, onClick: () => setSetting(s) }, s === "all" ? "All" : s.charAt(0).toUpperCase() + s.slice(1)))),
    h("div", { className: "filter-row mb-2" },
      h("button", { className: `chip ${muscle === "all" ? "active" : ""}`, onClick: () => setMuscle("all") }, "All muscles"),
      MUSCLES.map(m => h("button", { key: m, className: `chip ${muscle === m ? "active" : ""}`, onClick: () => setMuscle(m) }, MUSCLE_LABELS[m]))),
    h("div", { className: "filter-row mb-2" },
      h("button", { className: `chip ${equipment === "all" ? "active" : ""}`, onClick: () => setEquipment("all") }, "Any gear"),
      Object.entries(EQUIPMENT_LABELS).map(([k, v]) => h("button", { key: k, className: `chip ${equipment === k ? "active" : ""}`, onClick: () => setEquipment(k) }, v))),
    h("div", { className: "filter-row mb-3" },
      ["all","beginner","intermediate","advanced"].map(d => h("button", { key: d, className: `chip ${difficulty === d ? "active" : ""}`, onClick: () => setDifficulty(d) }, d === "all" ? "Any level" : d.charAt(0).toUpperCase() + d.slice(1)))),
    h("p", { className: "text-xs text-muted mb-2" }, filtered.length + " exercises"),
    filtered.slice(0, 120).map(ex => h("div", { key: ex.id, className: "library-item", onClick: () => setModal(h(ExerciseDetailModal, { exercise: ex, ctx })) },

// ═════════════════════════════════════════════════════════════════
// Workout Builder modal
// ═════════════════════════════════════════════════════════════════
function WorkoutBuilderModal({ existing, ctx, onSave, onDelete }) {
  const [name, setName] = useState(existing ? existing.name : "");
  const [focus, setFocus] = useState(existing ? (existing.focus || "") : "");
  const [items, setItems] = useState(existing ? existing.items.map(i => ({...i})) : []);
  const [picker, setPicker] = useState(false);

  const addExercises = (exercises) => {
    const newItems = exercises.map(ex => ({
      id: uid(), exerciseId: ex.id, name: ex.name, type: ex.type,
      sets: ex.default_sets || 3, targetReps: ex.default_reps || 10,
      weight: ex.equipment === "bodyweight" ? "BW" : "", rest: ex.default_rest || 60,
      notes: "",
    }));
    setItems(prev => [...prev, ...newItems]);
    setPicker(false);
  };

  const updateItem = (idx, patch) => setItems(prev => prev.map((it, i) => i === idx ? { ...it, ...patch } : it));
  const removeItem = (idx) => setItems(prev => prev.filter((_, i) => i !== idx));
  const moveItem = (idx, dir) => setItems(prev => {
    const j = idx + dir; if (j < 0 || j >= prev.length) return prev;
    const next = [...prev]; [next[idx], next[j]] = [next[j], next[idx]]; return next;
  });

  const save = () => {
    if (!name.trim() || items.length === 0) return;
    onSave({ id: existing ? existing.id : "w_" + uid(), name: name.trim(), focus: focus.trim(), items });

  if (picker) return h(ExercisePickerModal, { ctx, onPick: addExercises, onCancel: () => setPicker(false), multi: true });

  return h("div", null,
    h("div", { className: "flex justify-between items-center mb-3" },

      existing && h("button", { className: "btn btn-danger btn-sm", onClick: () => { if (confirm("Delete this routine?")) onDelete(existing.id); } },
        h(Icon, { name: "trash", size: 14, color: "var(--red)" }))),
    h("p", { className: "label" }, "Name"),
    h("input", { className: "input mb-3", placeholder: "Push day", value: name, onChange: e => setName(e.target.value) }),
    h("p", { className: "label" }, "Focus (optional)"),
    h("input", { className: "input mb-3", placeholder: "Chest · shoulders · triceps", value: focus, onChange: e => setFocus(e.target.value) }),
    h("div", { className: "flex justify-between items-center mb-2" },
      h("p", { className: "label", style: { margin: 0 } }, "Exercises (" + items.length + ")"),
      h("button", { className: "btn btn-primary btn-sm", onClick: () => setPicker(true) },
        h(Icon, { name: "plus", size: 14, color: "#fff", strokeWidth: 3 }), " Add")),
    items.length === 0 && h("div", { className: "card text-center", style: { padding: 24 } },
      h("p", { className: "text-sm text-muted" }, "Tap Add to pick exercises from the library.")),
    items.map((it, i) => {
      const r = ctx.resolveItem(it);
      return h("div", { key: it.id, className: "card card-tight", style: { marginBottom: 8 } },
        h("div", { className: "flex items-center gap-2 mb-2" },
          h("p", { className: "flex-1", style: { fontFamily: "var(--font)", fontSize: 14, fontWeight: 500 } }, r.name),
          h("button", { className: "btn btn-ghost btn-xs", onClick: () => moveItem(i, -1), disabled: i === 0 }, "↑"),
          h("button", { className: "btn btn-ghost btn-xs", onClick: () => moveItem(i, 1), disabled: i === items.length - 1 }, "↓"),
          h("button", { className: "btn btn-ghost btn-xs", onClick: () => removeItem(i) }, h(Icon, { name: "x", size: 12, color: "var(--red)" }))),
        h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 6 } },
          h("div", null, h("p", { className: "label", style: { fontSize: 10 } }, "Sets"), h("input", { className: "input input-sm text-center mono", type: "number", value: it.sets, onChange: e => updateItem(i, { sets: +e.target.value || 1 }) })),
          h("div", null, h("p", { className: "label", style: { fontSize: 10 } }, r.type === "timed" ? "Sec" : "Reps"), h("input", { className: "input input-sm text-center mono", type: "number", value: it.targetReps, onChange: e => updateItem(i, { targetReps: +e.target.value || 1 }) })),
          h("div", null, h("p", { className: "label", style: { fontSize: 10 } }, "Load"), h("input", { className: "input input-sm text-center mono", value: it.weight, placeholder: "BW", onChange: e => updateItem(i, { weight: e.target.value }) })),
          h("div", null, h("p", { className: "label", style: { fontSize: 10 } }, "Rest"), h("input", { className: "input input-sm text-center mono", type: "number", value: it.rest, onChange: e => updateItem(i, { rest: +e.target.value || 0 }) }))));
    }),
    h("button", { className: "btn btn-green btn-full mt-3", style: { padding: 14 }, disabled: !name.trim() || items.length === 0, onClick: save },
      h(Icon, { name: "check", size: 16, color: "#fff", strokeWidth: 3 }), " Save routine"));

// ═════════════════════════════════════════════════════════════════
// Exercise Picker modal
// ═════════════════════════════════════════════════════════════════
function ExercisePickerModal({ ctx, onPick, onCancel, multi = false, filterMuscle = null }) {
  const [search, setSearch] = useState("");
  const [setting, setSetting] = useState("all");
  const [muscle, setMuscle] = useState(filterMuscle || "all");
  const [selected, setSelected] = useState([]);

  const filtered = useMemo(() => {
    const q = search.toLowerCase().trim();
    return ctx.catalog.filter(e => {
      if (setting !== "all" && !e.settings.includes(setting)) return false;
      if (muscle !== "all" && e.primary_muscle !== muscle && !(e.secondary_muscles || []).includes(muscle)) return false;
      if (q && !e.name.toLowerCase().includes(q)) return false;
      return true;
    });
  }, [ctx.catalog, search, setting, muscle]);

  const toggle = (ex) => {
    if (!multi) { onPick([ex]); return; }

    h("div", { className: "filter-row mb-3" },
      h("button", { className: `chip ${muscle === "all" ? "active" : ""}`, onClick: () => setMuscle("all") }, "All"),
      MUSCLES.map(m => h("button", { key: m, className: `chip ${muscle === m ? "active" : ""}`, onClick: () => setMuscle(m) }, MUSCLE_LABELS[m]))),
    h("div", { style: { maxHeight: "50vh", overflowY: "auto" } },
      filtered.slice(0, 80).map(ex => {
        const isSel = selected.find(x => x.id === ex.id);
        return h("div", { key: ex.id, className: `library-item ${isSel ? "selected" : ""}`, onClick: () => toggle(ex) },
          h("div", { style: { flex: 1 } },
            h("p", { style: { fontFamily: "var(--font)", fontSize: 14, fontWeight: 500 } }, ex.name),
            h("div", { className: "flex gap-1 mt-1 flex-wrap" },
              h("span", { className: "muscle-pill primary" }, MUSCLE_LABELS[ex.primary_muscle]),
              h("span", { className: "muscle-pill" }, EQUIPMENT_LABELS[ex.equipment]))),
          multi && h("div", { className: `check-circle check-circle-sm ${isSel ? "done" : ""}` },
            isSel && h(Icon, { name: "check", size: 12, color: "#fff", strokeWidth: 3 })));
      })),
    multi && h("button", { className: "btn btn-primary btn-full mt-3", style: { padding: 14 }, disabled: selected.length === 0, onClick: () => onPick(selected) },
      h(Icon, { name: "check", size: 14, color: "#fff", strokeWidth: 3 }), " Add " + selected.length + (selected.length === 1 ? " exercise" : " exercises")));

// ═════════════════════════════════════════════════════════════════
// Active Workout — per-set logging
// ═════════════════════════════════════════════════════════════════
function ActiveWorkoutPage({ session, setSession, completeWorkout, setPage, setModal, ctx }) {
  const [restSecs, setRestSecs] = useState(null);
  const restRef = useRef(null);
  const quote = useMemo(() => getQuoteOfDay(), [session.id]);

  const doRest = (secs) => {
    if (restRef.current) clearInterval(restRef.current);
    setRestSecs(secs);
    restRef.current = setInterval(() => setRestSecs(prev => { if (prev <= 1) { clearInterval(restRef.current); return null; } return prev - 1; }), 1000);
  };
  const skipRest = () => { clearInterval(restRef.current); setRestSecs(null); };
  useEffect(() => () => { if (restRef.current) clearInterval(restRef.current); }, []);

  const totalSets = session.items.reduce((a, it) => a + it.sets.length, 0);
  const doneSets = session.items.reduce((a, it) => a + it.sets.filter(s => s.done).length, 0);
  const donePct = totalSets ? (doneSets / totalSets) * 100 : 0;
  const allDone = totalSets > 0 && doneSets === totalSets;

  const updateSet = (itemIdx, setIdx, patch) => {
    setSession(prev => ({ ...prev, items: prev.items.map((it, i) => i === itemIdx ? {
      ...it, sets: it.sets.map((s, j) => j === setIdx ? { ...s, ...patch } : s)
    } : it) }));
  };
  const addSet = (itemIdx) => {
    setSession(prev => ({ ...prev, items: prev.items.map((it, i) => i === itemIdx ? {
      ...it, sets: [...it.sets, { ...(it.sets[it.sets.length - 1] || { reps: 0, weight: 0, weightLabel: "BW", done: false, rpe: null, notes: "" }), done: false }]
    } : it) }));
  };
  const removeSet = (itemIdx) => {
    setSession(prev => ({ ...prev, items: prev.items.map((it, i) => i === itemIdx && it.sets.length > 1 ? {
      ...it, sets: it.sets.slice(0, -1)
    } : it) }));
  };
  const swapExercise = (itemIdx) => {
    const item = session.items[itemIdx];
    const ex = ctx.catalogById[item.exerciseId];
    const filterMuscle = ex ? ex.primary_muscle : null;
    setModal(h(ExercisePickerModal, { ctx, filterMuscle,
      onPick: (picked) => {
        const p = picked[0];
        setSession(prev => ({ ...prev, items: prev.items.map((it, i) => i === itemIdx ? {
          ...it, exerciseId: p.id, name: p.name, type: p.type,
        } : it) }));
        setModal(null);
      },
      onCancel: () => setModal(null) }));
  };

  const openSetLogger = (itemIdx, setIdx) => {
    const it = session.items[itemIdx];
    const set = it.sets[setIdx];
    const prev = ctx.findLastSetsFor(it.exerciseId);
    setModal(h(SetLoggerModal, {
      exerciseName: it.name, type: it.type, set, setIndex: setIdx,
      prevSet: prev[setIdx] || null,
      onSave: (patch) => {
        updateSet(itemIdx, setIdx, { ...patch, done: true });
        if ((it.rest || 60) > 0) doRest(it.rest || 60);
        setModal(null);
      },
    }));
  };

  return h("div", { className: "page", style: { paddingBottom: 160 } },
    h("div", { className: "flex justify-between items-center mb-3" },
      h("button", { className: "btn btn-ghost btn-sm", onClick: () => { if (confirm("Pause your session?")) setPage("home"); } },
        h(Icon, { name: "x", size: 16 }), " Pause"),
      h("span", { className: "tag tag-red" }, "In session"),
      h("div", { style: { width: 60 } })),

    h("div", { className: "card card-hot text-center", style: { padding: "28px 20px" } },
      h("p", { style: { fontSize: 12, color: "var(--accent-deep)", marginBottom: 8, fontWeight: 500 } }, session.workoutName + (session.focus ? "  ·  " + session.focus : "")),
      h("div", { className: "flex items-center justify-center gap-4", style: { margin: "8px 0" } },
        h("div", { className: "display-xl" }, doneSets),
        h("div", { className: "display-xl", style: { color: "var(--text3)" } }, "/"),
        h("div", { className: "display-xl", style: { color: "var(--text3)" } }, totalSets)),
      h("p", { style: { fontSize: 12, color: "var(--text2)", marginTop: 4 } }, "Sets logged"),
      h("p", { style: { fontFamily: "var(--font-display)", fontSize: 16, fontStyle: "italic", color: "var(--text2)", marginTop: 10 } },
        allDone ? "Practice complete." :
        doneSets === 0 ? "Let's begin." :
        doneSets / totalSets < 0.5 ? "Steady." :
        doneSets / totalSets < 1 ? "Almost done." : ""),
      h("div", { className: "progress-bar mt-3", style: { height: 5 } },
        h("div", { className: "progress-bar-fill", style: { width: donePct + "%" } }))),

    h("div", { className: "divider-label mt-3" }, h("span", null, "Your sets")),

    session.items.map((item, itemIdx) => {
      const prev = ctx.findLastSetsFor(item.exerciseId);
      const pr = ctx.prs[item.exerciseId];
      return h("div", { key: item.exerciseId + itemIdx, className: "card card-iron" },
        h("div", { className: "flex items-center gap-2 mb-2" },
          h("div", { style: { flex: 1 } },
            h("p", { style: { fontFamily: "var(--font)", fontSize: 15, fontWeight: 500 } }, item.name),
            h("p", { style: { fontSize: 11, color: "var(--text3)", marginTop: 2 } }, item.sets.length + " sets · " + (item.rest || 60) + "s rest")),
          pr && pr.oneRm > 0 && h("span", { className: "pr-badge" }, h(Icon, { name: "trophy", size: 9, color: "#fff" }), " " + pr.oneRm)),
        prev.length > 0 && h("div", { className: "prev-session" }, "Last: ",
          prev.slice(0, 3).map((p, i) => (i ? " · " : "") + (item.type === "timed" ? p.duration + "s" : p.reps + "×" + (p.weight ? p.weight + "lb" : "BW"))).join("")),
        h("div", { className: "flex flex-col mt-2" },
          item.sets.map((set, setIdx) => h("div", { key: setIdx, className: `set-row ${set.done ? "done" : ""}` },
            h("div", { className: "set-num" }, setIdx + 1),
            item.type === "timed"
              ? h("input", { className: "input input-sm", placeholder: "SEC", type: "number", value: set.duration || "", onChange: e => updateSet(itemIdx, setIdx, { duration: +e.target.value || 0 }) })
              : h("input", { className: "input input-sm", placeholder: "REPS", type: "number", value: set.reps || "", onChange: e => updateSet(itemIdx, setIdx, { reps: +e.target.value || 0 }) }),
            item.type === "timed"
              ? h("span", { className: "text-xs text-muted text-center" }, "—")
              : h("input", { className: "input input-sm", placeholder: "LOAD", value: set.weightLabel || "", onChange: e => {
                  const lbl = e.target.value; updateSet(itemIdx, setIdx, { weightLabel: lbl, weight: parseWeight(lbl) });
                } }),
            h("button", { className: `check-circle check-circle-sm ${set.done ? "done" : ""}`, onClick: () => {
              if (set.done) { updateSet(itemIdx, setIdx, { done: false }); return; }
              openSetLogger(itemIdx, setIdx);
            } }, set.done && h(Icon, { name: "check", size: 12, color: "#fff", strokeWidth: 3 }))))),
        h("div", { className: "flex gap-2 mt-2" },
          h("button", { className: "btn btn-ghost btn-xs", onClick: () => addSet(itemIdx) }, h(Icon, { name: "plus", size: 11 }), " Set"),
          item.sets.length > 1 && h("button", { className: "btn btn-ghost btn-xs", onClick: () => removeSet(itemIdx) }, h(Icon, { name: "minus", size: 11 }), " Set"),
          h("button", { className: "btn btn-ghost btn-xs", onClick: () => swapExercise(itemIdx), style: { marginLeft: "auto" } }, h(Icon, { name: "swap", size: 11 }), " Swap")));
    }),

    !allDone && h("p", { className: "text-center mt-3", style: { fontFamily: "var(--font-display)", fontSize: 14, fontStyle: "italic", color: "var(--text3)" } },
      "“" + quote.t + "”"),

    restSecs !== null && h("div", { className: "rest-timer-bar" },
      h("div", { className: "flex items-center gap-3" },
        h(Icon, { name: "timer", size: 18, color: "var(--accent)" }),
        h("div", null,
          h("div", { style: { fontFamily: "var(--font-display)", fontSize: 24, fontVariantNumeric: "tabular-nums", color: "var(--accent)", lineHeight: 1 } }, restSecs, "s"),
          h("div", { style: { fontSize: 10, color: "var(--text3)" } }, "Rest"))),
      h("div", { className: "flex gap-1" },
        [30,60,90].map(s => h("button", { key: s, className: "btn btn-ghost btn-sm", style: { padding: "6px 8px", fontSize: 11 }, onClick: () => doRest(s) }, s)),
        h("button", { className: "btn btn-ghost btn-sm", onClick: skipRest, style: { color: "#6B8E55", padding: "6px 8px", fontSize: 11 } }, "Skip"))),

    h("div", { style: { position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, padding: "16px 16px max(16px, env(safe-area-inset-bottom))", background: "linear-gradient(180deg, transparent, var(--bg) 40%)" } },
      h("button", { className: `btn btn-full ${allDone ? "btn-green btn-massive" : "btn-secondary"}`, style: { padding: 18, fontSize: 16 }, onClick: completeWorkout },
        h(Icon, { name: allDone ? "check" : "arrow", size: 18, color: allDone ? "#fff" : "var(--text3)", strokeWidth: 3 }),
        allDone ? " Finish & earn reward" : " Finish session")));
}

// Progress — Calendar | Weekly | Exercises | PRs | Volume

function ProgressPage({ sessions, cardioLogs, bodyStats, schedule, ctx }) {
  const [tab, setTab] = useState("calendar");
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const completedDates = new Set(sessions.filter(s => s.status === "complete").map(s => s.date));

  const last4Weeks = useMemo(() => Array.from({length: 4}, (_, i) => {
    const ws = new Date(now); ws.setDate(now.getDate() - now.getDay() - (i * 7)); ws.setHours(0,0,0,0);
    const we = new Date(ws); we.setDate(ws.getDate() + 7);
    return sessions.filter(s => { const d = parseDate(s.date); return s.status === "complete" && d >= ws && d < we; }).length;
  }).reverse(), [sessions]);

  const volumeByMuscle = useMemo(() => {
    const weeks = Array.from({length: 6}, (_, i) => {
      const ws = new Date(now); ws.setDate(now.getDate() - now.getDay() - ((5-i) * 7)); ws.setHours(0,0,0,0);
      const we = new Date(ws); we.setDate(ws.getDate() + 7);
      return { ws, we, byMuscle: {} };
    });
    for (const s of sessions) {
      if (s.status !== "complete") continue;
      const d = parseDate(s.date);
      const wk = weeks.find(w => d >= w.ws && d < w.we);
      if (!wk) continue;
      for (const it of s.items || []) {
        const cat = ctx.catalogById[it.exerciseId];
        if (!cat) continue;
        const vol = (it.sets || []).filter(x => x.done).reduce((a, x) => a + (x.reps || 0) * Math.max(x.weight || 0, 1), 0);
        wk.byMuscle[cat.primary_muscle] = (wk.byMuscle[cat.primary_muscle] || 0) + vol;
      }
    }
    return weeks;
  }, [sessions, ctx.catalogById]);

  const topMuscles = useMemo(() => {
    const all = {};
    for (const w of volumeByMuscle) for (const [m, v] of Object.entries(w.byMuscle)) all[m] = (all[m] || 0) + v;
    return Object.entries(all).sort((a,b) => b[1] - a[1]).slice(0, 6).map(x => x[0]);
  }, [volumeByMuscle]);

  const prList = useMemo(() => Object.values(ctx.prs).filter(p => p.oneRm > 0).sort((a,b) => b.oneRm - a.oneRm), [ctx.prs]);

  return h("div", { className: "page" },
    h(Kicker, null, "Your journey"),
    h("h1", { className: "mb-4", style: { fontSize: 36, fontStyle: "italic" } }, "Progress"),
    h("div", { className: "tab-bar mb-4", style: { overflowX: "auto" } },
      [["calendar","Calendar"],["weekly","Weekly"],["exercises","Exercises"],["prs","Records"],["volume","Volume"]].map(([t,l]) => h("button", { key: t, className: `tab ${tab === t ? "active" : ""}`, onClick: () => setTab(t) }, l))),

    tab === "calendar" && h("div", { className: "card card-iron" },
      h("h3", { className: "mb-3" }, now.toLocaleString("default", { month: "long", year: "numeric" })),
      h("div", { className: "cal-grid mb-2" }, ["S","M","T","W","T","F","S"].map((d,i) => h("div", { key: i, className: "text-center mono", style: { fontSize: 10, letterSpacing: 1, color: "var(--text3)", padding: "4px 0" } }, d))),
      h("div", { className: "cal-grid" },
        Array.from({length: firstDay}, (_, i) => h("div", { key: "e"+i })),
        Array.from({length: daysInMonth}, (_, i) => {
          const day = i + 1;
          const ds = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const done = completedDates.has(ds);
          const isToday = day === now.getDate();
          const isScheduled = !!schedule[DAYS[new Date(year, month, day).getDay()]];
          return h("div", { key: day, className: `cal-cell ${done ? "done" : ""} ${isToday ? "today" : ""} ${!isScheduled && !done ? "rest" : ""}` }, day);
        }))),

    tab === "weekly" && h("div", { className: "card card-iron" },
      h("h3", { className: "mb-3" }, "Last 4 weeks"),
      h("div", { className: "flex items-end gap-2", style: { height: 140 } },
        last4Weeks.map((w, i) => h("div", { key: i, style: { flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6 } },
          h("span", { style: { fontFamily: "var(--font-display)", fontSize: 18, fontWeight: 500, color: w > 0 ? "var(--accent)" : "var(--text3)" } }, w),
          h("div", { style: { width: "100%", height: Math.max((w / 5) * 100, 4) + "%", background: w > 0 ? "var(--accent)" : "var(--surface2)", borderRadius: 8, minHeight: 4, transition: "height .8s ease" } }),
          h("span", { style: { fontSize: 10, color: "var(--text3)" } }, i === 3 ? "This wk" : (3-i) + "w ago")))),
      h("div", { className: "mt-4" },
        h("p", { className: "text-sm text-muted" }, "Total sessions: ", h("span", { className: "text-accent font-semibold" }, sessions.filter(s => s.status === "complete").length)),
        h("p", { className: "text-sm text-muted mt-2" }, "Cardio sessions: ", h("span", { className: "text-green font-semibold" }, cardioLogs.length)))),

    tab === "exercises" && (() => {
      const completedSessions = sessions.filter(s => s.status === "complete");
      const byEx = {};
      for (const s of completedSessions) for (const it of s.items || []) {
        if (!byEx[it.exerciseId]) byEx[it.exerciseId] = { name: it.name, count: 0, last: null, lastDate: null };
        if ((it.sets || []).some(x => x.done)) {
          byEx[it.exerciseId].count++;
          byEx[it.exerciseId].last = it.sets.filter(x => x.done).pop();
          byEx[it.exerciseId].lastDate = s.date;
        }
      }
      const entries = Object.entries(byEx).sort((a,b) => b[1].count - a[1].count);
      return entries.length === 0 ? h("div", { className: "card text-center", style: { padding: 40 } }, h("p", { className: "text-muted" }, "No data yet. Log a session to see exercise history."))
        : entries.slice(0, 20).map(([id, info]) => h("div", { key: id, className: "card card-tight" },
          h("div", { className: "flex justify-between items-center" },
            h("div", null,
              h("p", { style: { fontFamily: "var(--font)", fontSize: 14, fontWeight: 500 } }, info.name),
              h("p", { style: { fontSize: 11, color: "var(--text3)", marginTop: 2 } }, "Logged " + info.count + "×" + (info.lastDate ? " · " + info.lastDate : ""))),
            info.last && h("p", { style: { fontFamily: "var(--font-display)", fontSize: 17, color: "var(--accent)", fontWeight: 500 } }, info.last.reps + (info.last.weight ? " @ " + info.last.weight + "lb" : " reps")))));
    })(),

    tab === "prs" && (prList.length === 0 ? h("div", { className: "card text-center", style: { padding: 40 } }, h("p", { className: "text-muted" }, "Log weighted sets to track personal records."))
      : prList.map(pr => h("div", { key: pr.exerciseId, className: "card card-tight" },
          h("div", { className: "flex justify-between items-center" },
            h("div", null,
              h("p", { style: { fontFamily: "var(--font)", fontSize: 14, fontWeight: 500 } }, pr.name),
              h("p", { style: { fontSize: 11, color: "var(--text3)", marginTop: 2 } }, pr.topSet ? pr.topSet.reps + "×" + pr.topSet.weight + "lb · " + pr.date : pr.date)),
            h("div", { className: "text-right" },
              h("p", { style: { fontFamily: "var(--font-display)", fontSize: 22, fontWeight: 500, color: "var(--gold)", letterSpacing: -0.5 } }, pr.oneRm, h("span", { style: { fontSize: 12 } }, " lb")),
              h("p", { style: { fontSize: 10, color: "var(--text3)" } }, "Est. 1RM")))))),

    tab === "volume" && (topMuscles.length === 0 ? h("div", { className: "card text-center", style: { padding: 40 } }, h("p", { className: "text-muted" }, "Volume appears once you log weighted sets."))
      : topMuscles.map(m => {
          const values = volumeByMuscle.map(w => w.byMuscle[m] || 0);
          const max = Math.max(...values, 1);
          return h("div", { key: m, className: "card card-tight" },
            h("p", { style: { fontFamily: "var(--font)", fontSize: 14, fontWeight: 500, marginBottom: 8 } }, MUSCLE_LABELS[m] || m),
            h("div", { className: "flex items-end gap-1", style: { height: 50 } },
              values.map((v, i) => h("div", { key: i, style: { flex: 1, height: (v/max)*100 + "%", minHeight: 4, background: i === values.length - 1 ? "var(--accent)" : "var(--surface2)", borderRadius: 6, border: "1px solid var(--line)" } }))),
            h("div", { className: "flex justify-between mt-2" },
              h("span", { style: { fontSize: 10, color: "var(--text3)" } }, "6 wks ago"),
              h("span", { style: { fontFamily: "var(--font-display)", fontSize: 14, fontWeight: 500 } }, values[values.length-1].toLocaleString() + " lb"),
              h("span", { style: { fontSize: 10, color: "var(--text3)" } }, "Now")));
        })));
}

// Photos
// ═════════════════════════════════════════════════════════════════
function PhotosPage() {
  const [photos, setPhotos] = useState([]);
  const [tag, setTag] = useState("front");
  const [loading, setLoading] = useState(true);
  const fileRef = useRef(null);

  useEffect(() => { PhotoDB.getAll().then(p => { setPhotos(p); setLoading(false); }).catch(() => setLoading(false)); }, []);

  const handleUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const MAX = 800;
        let w = img.width, ht = img.height;
        if (w > MAX || ht > MAX) { if (w > ht) { ht = ht * MAX / w; w = MAX; } else { w = w * MAX / ht; ht = MAX; } }
        canvas.width = w; canvas.height = ht;
        canvas.getContext("2d").drawImage(img, 0, 0, w, ht);
        const compressed = canvas.toDataURL("image/jpeg", 0.7);
        const photo = { id: uid(), date: todayStr(), tag, src: compressed };
        PhotoDB.add(photo).then(() => setPhotos(prev => [photo, ...prev]));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  const deletePhoto = async (id) => {
    if (!confirm("Delete this photo?")) return;
    await PhotoDB.remove(id);
    setPhotos(prev => prev.filter(p => p.id !== id));
  };

  const filtered = photos.filter(p => p.tag === tag);
  const tagLabel = { front: "Front", side: "Side", back: "Back" };

  return h("div", { className: "page" },
    h("div", { className: "flex justify-between items-end mb-3" },
      h("div", null,
        h(Kicker, null, "Your progress"),
        h("h1", { style: { fontSize: 36, fontStyle: "italic" } }, "Photos")),
      h("button", { className: "btn btn-primary btn-sm", onClick: () => fileRef.current?.click() },
        h(Icon, { name: "plus", size: 14, color: "#fff", strokeWidth: 3 }), " Add")),
    h("input", { ref: fileRef, type: "file", accept: "image/*", capture: "environment", style: { display: "none" }, onChange: handleUpload }),
    h("div", { className: "flex gap-2 mb-3" },
      ["front","side","back"].map(t => h("button", { key: t, className: `chip ${tag === t ? "active" : ""}`, onClick: () => setTag(t) }, tagLabel[t]))),
    loading ? h("div", { className: "card text-center loading-pulse", style: { padding: 40 } }, h("p", { className: "text-muted" }, "Loading…"))
    : filtered.length === 0 ? h("div", { className: "card text-center", style: { padding: 48 } },
        h(Icon, { name: "camera", size: 40, color: "var(--text3)" }),
        h("p", { style: { fontFamily: "var(--font-display)", fontSize: 18, fontStyle: "italic", marginTop: 12, marginBottom: 6 } }, "No " + tag + " photos yet"),
        h("p", { className: "text-sm text-muted mb-3" }, "Gentle progress is still progress. Capture how you look today."),
        h("button", { className: "btn btn-primary btn-sm", onClick: () => fileRef.current?.click() },
          h(Icon, { name: "camera", size: 14, color: "#fff" }), " Take photo"))
    : h("div", { className: "photo-grid" },
        filtered.map(p => h("div", { key: p.id, className: "photo-cell", onClick: () => deletePhoto(p.id) },
          h("img", { src: p.src, alt: p.tag, loading: "lazy" })))),
    photos.length > 0 && h("p", { className: "text-center mt-3", style: { fontSize: 11, color: "var(--text3)" } }, "Stored on your device · tap to delete"));
}
