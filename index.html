      h("div", null, h("p", { className: "label" }, "Sleep (hrs)"), h("input", { className: "input", type: "number", placeholder: "7.5", step: "0.5", value: sleep, onChange: e => setSleep(e.target.value) }))),
    h("p", { className: "label mb-2" }, "Energy"),
    h("div", { className: "flex gap-1 mb-3" },
      [1,2,3,4,5].map(n => h("button", { key: n, className: `chip ${energy === n ? "active" : ""}`, style: { flex: 1, justifyContent: "center", padding: 12 }, onClick: () => setEnergy(n) }, "⚡".repeat(n)))),
    h("p", { className: "label mb-2" }, "Soreness"),
    h("div", { className: "flex gap-1 mb-3" },
      [1,2,3,4,5].map(n => h("button", { key: n, className: `chip ${soreness === n ? "active" : ""}`, style: { flex: 1, justifyContent: "center", padding: 12 }, onClick: () => setSoreness(n) }, "🌶".repeat(n)))),
    h("button", { className: "btn btn-ghost btn-sm mb-3", onClick: () => setShowMeasure(v => !v) },
      h(Icon, { name: showMeasure ? "chevronDown" : "chevronRight", size: 14 }), " Body measurements"),
    showMeasure && h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }, className: "mb-3" },
      h("div", null, h("p", { className: "label" }, "Chest (in)"), h("input", { className: "input input-sm", type: "number", step: "0.25", value: chest, onChange: e => setChest(e.target.value) })),
      h("div", null, h("p", { className: "label" }, "Waist (in)"), h("input", { className: "input input-sm", type: "number", step: "0.25", value: waist, onChange: e => setWaist(e.target.value) })),
      h("div", null, h("p", { className: "label" }, "Arm (in)"), h("input", { className: "input input-sm", type: "number", step: "0.25", value: arm, onChange: e => setArm(e.target.value) })),
      h("div", null, h("p", { className: "label" }, "Thigh (in)"), h("input", { className: "input input-sm", type: "number", step: "0.25", value: thigh, onChange: e => setThigh(e.target.value) })),
      h("div", null, h("p", { className: "label" }, "Body fat (%)"), h("input", { className: "input input-sm", type: "number", step: "0.1", value: bodyfat, onChange: e => setBodyfat(e.target.value) }))),
    h("button", { className: "btn btn-primary btn-full", style: { padding: 14 }, onClick: save },
      h(Icon, { name: "check", size: 16, color: "#fff", strokeWidth: 3 }), " Save"));
}

// ═════════════════════════════════════════════════════════════════
// Cardio modal
// ═════════════════════════════════════════════════════════════════
function CardioModal({ onSave }) {
  const [type, setType] = useState("Running");
  const [duration, setDuration] = useState("30");
  const [distance, setDistance] = useState("");
  const [intensity, setIntensity] = useState("moderate");
  const calcCals = () => { const d = +duration || 0; return Math.round(d * (intensity === "light" ? 5 : intensity === "moderate" ? 8 : 11)); };

  return h("div", null,
    h(Kicker, null, "Cardio"),
    h("h2", { className: "mb-3", style: { fontStyle: "italic" } }, "Log a session"),
    h("p", { className: "label mb-2" }, "Activity"),
    h("div", { className: "flex gap-2 mb-3 flex-wrap" },
      CARDIO_TYPES.map(t => h("button", { key: t, className: `chip ${type === t ? "active" : ""}`, onClick: () => setType(t) }, t))),
    h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }, className: "mb-3" },
      h("div", null, h("p", { className: "label" }, "Duration (min)"), h("input", { className: "input", type: "number", value: duration, onChange: e => setDuration(e.target.value) })),
      h("div", null, h("p", { className: "label" }, "Distance (mi)"), h("input", { className: "input", type: "number", placeholder: "Optional", step: "0.1", value: distance, onChange: e => setDistance(e.target.value) }))),
    h("p", { className: "label mb-2" }, "Effort"),
    h("div", { className: "flex gap-2 mb-3" },
      ["light","moderate","intense"].map(i => h("button", { key: i, className: `chip ${intensity === i ? "active" : ""}`, style: { flex: 1, justifyContent: "center", padding: 12 }, onClick: () => setIntensity(i) }, i.charAt(0).toUpperCase() + i.slice(1)))),
    h("div", { className: "card card-iron text-center", style: { padding: 18 } },
      h("p", { className: "label" }, "Est. calories"),
      h("p", { style: { fontFamily: "var(--font-display)", fontSize: 38, fontWeight: 500, color: "var(--accent)", lineHeight: 1, letterSpacing: -0.5 } }, "~" + calcCals())),
    h("button", { className: "btn btn-green btn-full mt-3", style: { padding: 14 }, onClick: () => onSave({ type, duration: +duration, distance: distance ? +distance : null, intensity, calories: calcCals() }) },
      h(Icon, { name: "check", size: 16, color: "#fff", strokeWidth: 3 }), " Save"));
}

// ═════════════════════════════════════════════════════════════════
// Settings
// ═════════════════════════════════════════════════════════════════
function SettingsPage({ profile, setProfile, darkMode, setDarkMode, onReset, workouts, schedule, setSchedule, setModal, authUser, signInGoogle, signOut, rewardConfig, setRewardConfig }) {
  const openScheduleEditor = () => setModal(h(ScheduleEditorModal, { workouts, schedule, onSave: (s) => { setSchedule(s); setModal(null); } }));
  const cfg = rewardConfig || DEFAULT_REWARDS;
  const setCfg = (patch) => setRewardConfig({ ...cfg, ...patch });
  const exportData = () => {
    const payload = {
      version: SCHEMA_VERSION, exportedAt: new Date().toISOString(),
      profile, workouts, schedule, darkMode,
      bodyStats: S.get("bodyStats", []), cardioLogs: S.get("cardioLogs", []),
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `reps-export-${todayStr()}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  return h("div", { className: "page" },
    h(Kicker, null, "Your space"),
    h("h1", { className: "mb-4", style: { fontSize: 36, fontStyle: "italic" } }, "Settings"),

    // Sign-in for cloud sync with SpendLens
    h("div", { className: authUser ? "card card-iron" : "auth-card" },
      h("h3", { className: "mb-2" }, "Connect with SpendLens"),
      authUser ? h("div", null,
        h("p", { className: "text-sm text-muted mb-2" }, "Signed in as ", h("span", { style: { color: "var(--text)" } }, authUser.email)),
        h("p", { className: "text-xs text-muted mb-3" }, "Your reward wallet syncs with SpendLens automatically."),
        h("button", { className: "btn btn-secondary btn-sm", onClick: signOut }, "Sign out"))
      : h("div", null,
        h("p", { className: "text-sm text-muted mb-3" }, "Sign in with Google to share your guilt-free wallet with SpendLens. Your rewards become spendable money in SpendLens, no guilt attached."),
        h("button", { className: "btn btn-primary btn-full", onClick: signInGoogle }, h(Icon, { name: "arrow", size: 14, color: "#fff" }), " Sign in with Google"))),

    h("div", { className: "card card-iron" },
      h("h3", { className: "mb-3" }, "About you"),
      h("p", { className: "label" }, "Name"),
      h("input", { className: "input mb-3", value: profile.name, onChange: e => setProfile({...profile, name: e.target.value}) }),
      h("p", { className: "label" }, "Goal"),
      h("div", { className: "flex gap-2 mb-3 flex-wrap" },
        GOALS.map(g => h("button", { key: g, className: `chip ${profile.goal === g ? "active" : ""}`, onClick: () => setProfile({...profile, goal: g}) }, g))),
      h("p", { className: "label" }, "Setting"),
      h("div", { className: "flex gap-2 mb-3" },
        SETTINGS_OPTIONS.map(s => h("button", { key: s, className: `chip ${profile.setting === s ? "active" : ""}`, onClick: () => setProfile({...profile, setting: s}) }, s))),
      h("p", { className: "label" }, "Equipment"),
      h("div", { className: "flex gap-1 flex-wrap" },
        Object.entries(EQUIPMENT_LABELS).map(([k, v]) => h("button", { key: k, className: `chip chip-sm ${(profile.equipment||[]).includes(k) ? "active" : ""}`, onClick: () => {
          const eq = profile.equipment || [];
          setProfile({...profile, equipment: eq.includes(k) ? eq.filter(x => x !== k) : [...eq, k]});
        } }, v)))),

    h("div", { className: "card" },
      h("div", { className: "flex justify-between items-center" },
        h("div", null,
          h("h3", null, "Weekly rhythm"),
          h("p", { className: "text-xs text-muted mt-1" }, "Assign routines to days")),
        h("button", { className: "btn btn-secondary btn-sm", onClick: openScheduleEditor }, h(Icon, { name: "calendar", size: 14 }), " Edit"))),

    // Rewards configuration
    h("div", { className: "card" },
      h("h3", { className: "mb-2" }, "Rewards"),
      h("p", { className: "text-xs text-muted mb-3" }, "How much you earn for each kind of session. Defaults target around $120 per month if you train 4× a week."),
      h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 } },
        [["workout","Per workout"],["streakDay","Per streak day"],["streakCap","Streak cap"],["weeklyGoal","Weekly goal"],["pr","Per PR"],["cardio","Per cardio"]].map(([k,l]) =>
          h("div", { key: k },
            h("p", { className: "label" }, l),
            h("div", { className: "flex items-center gap-1" },
              h("span", { style: { fontFamily: "var(--font-mono)", color: "var(--text3)", fontSize: 13 } }, "$"),
              h("input", { className: "input input-sm mono", type: "number", step: "0.5", min: "0", value: cfg[k], onChange: e => setCfg({ [k]: +e.target.value || 0 }) }))))) ),

    h("div", { className: "card" },
      h("div", { className: "flex justify-between items-center" },
        h("div", { className: "flex items-center gap-2" },
          h(Icon, { name: darkMode ? "moon" : "sun", size: 18, color: "var(--accent)" }),
          h("span", { style: { fontFamily: "var(--font)", fontSize: 15, fontWeight: 500 } }, "Twilight mode")),
        h("button", { className: "btn btn-secondary btn-sm", onClick: () => setDarkMode(!darkMode), style: { minWidth: 70 } }, darkMode ? "On" : "Off"))),

    h("div", { className: "card" },
      h("h3", { className: "mb-2" }, "Data"),
      h("button", { className: "btn btn-secondary btn-full", onClick: exportData },
        h(Icon, { name: "copy", size: 14 }), " Export my data"),
      h("p", { className: "text-xs text-muted mt-2" }, "Downloads a JSON backup to your device.")),

    h("div", { className: "card" },
      h("h3", { className: "mb-2" }, "About"),
      h("p", { style: { fontSize: 11, color: "var(--text3)" } }, "REPS · Calm Edition"),
      h("p", { className: "text-sm text-muted mt-2", style: { lineHeight: 1.55, fontStyle: "italic" } }, "Every rep is a step. Every step is the path.")),

    h("div", { className: "card card-hot text-center", style: { padding: 18 } },
      h("p", { style: { fontFamily: "var(--font)", fontSize: 14, fontWeight: 600, color: "var(--accent-deep)" } }, "Add to home screen"),
      h("p", { style: { fontSize: 12, color: "var(--text2)", marginTop: 8 } }, "iOS: Share → Add to Home Screen"),
      h("p", { style: { fontSize: 12, color: "var(--text2)", marginTop: 2 } }, "Android: Menu → Install app")),

    h("button", { className: "btn btn-secondary btn-full mt-2", style: { color: "var(--red)", borderColor: "var(--red)" }, onClick: () => { if (confirm("This will erase all your data on this device. Continue?")) onReset(); } }, "Reset all data"));
}

// ═════════════════════════════════════════════════════════════════
// Schedule Editor
// ═════════════════════════════════════════════════════════════════
function ScheduleEditorModal({ workouts, schedule, onSave }) {
  const [edit, setEdit] = useState({ ...schedule });
  const setDay = (day, wid) => setEdit(prev => ({ ...prev, [day]: wid }));

  return h("div", null,
    h(Kicker, null, "Rhythm"),
    h("h2", { className: "mb-3", style: { fontStyle: "italic" } }, "Weekly schedule"),
    h("p", { className: "text-sm text-muted mb-3" }, "Tap a routine to assign it. Choose \"Rest\" for off days."),
    DAYS.map(d => h("div", { key: d, className: "card card-tight" },
      h("p", { style: { fontFamily: "var(--font)", fontSize: 14, fontWeight: 600, marginBottom: 8 } }, d),
      h("div", { className: "flex flex-wrap gap-1" },
        h("button", { className: `chip chip-sm ${!edit[d] ? "active" : ""}`, onClick: () => setDay(d, null) }, "Rest"),
        workouts.map(w => h("button", { key: w.id, className: `chip chip-sm ${edit[d] === w.id ? "active" : ""}`, onClick: () => setDay(d, w.id) }, w.name))))),
    h("button", { className: "btn btn-primary btn-full mt-3", style: { padding: 14 }, onClick: () => onSave(edit) },
      h(Icon, { name: "check", size: 16, color: "#fff", strokeWidth: 3 }), " Save schedule"));
}

// ═════════════════════════════════════════════════════════════════
// Wallet — guilt-free reward balance, shared with SpendLens
// ═════════════════════════════════════════════════════════════════
const SOURCE_LABELS = {
  workout: "Workout complete",
  streak_bonus: "Streak bonus",
  weekly_goal: "Weekly goal",
  pr_bonus: "New personal record",
  cardio: "Cardio session",
  manual_deposit: "Manual deposit",
  spend: "Spent",
  adjustment: "Adjustment",
};
const SOURCE_ICONS = {
  workout: "dumbbell", streak_bonus: "flame", weekly_goal: "trophy",
  pr_bonus: "trophy", cardio: "run", manual_deposit: "plus",
  spend: "heart", adjustment: "edit",
};

function WalletPage({ walletBalance, walletTxns, walletSyncing, authUser, signInGoogle, signOut, setModal }) {
  const earnedTotal = useMemo(() => walletTxns.filter(t => t.amount > 0).reduce((a,t) => a + t.amount, 0), [walletTxns]);
  const spentTotal = useMemo(() => walletTxns.filter(t => t.amount < 0).reduce((a,t) => a + Math.abs(t.amount), 0), [walletTxns]);

  const openSpend = () => setModal(h(SpendWalletModal, { balance: walletBalance, onConfirm: () => {} }));

  return h("div", { className: "page" },
    h(Kicker, null, "Your reward"),
    h("h1", { className: "mb-3", style: { fontSize: 36, fontStyle: "italic" } }, "Guilt-free wallet"),

    h("div", { className: "wallet-hero" },
      h("p", { className: "text-xs", style: { color: "var(--text2)", letterSpacing: .2 } }, "Available to spend"),
      h("p", { className: "wallet-balance mt-1" }, "$", walletBalance.toFixed(2)),
      h("p", { className: "text-sm text-muted mt-2", style: { lineHeight: 1.5 } }, "Earned by showing up. Spend it on something nice — no guilt attached."),
      h("div", { className: "flex gap-2 mt-3" },
        h("button", { className: "btn btn-primary btn-full", disabled: walletBalance <= 0, onClick: () => setModal(h(SpendWalletModal, { balance: walletBalance, authUser, signInGoogle, onConfirm: (amount, description) => { setModal(null); } })) },
          h(Icon, { name: "heart", size: 14, color: "#fff" }), " Spend"),
        h("button", { className: "btn btn-secondary", onClick: () => setModal(h(WalletInfoModal, null)) }, h(Icon, { name: "book", size: 14 })))),

    !authUser && h("div", { className: "auth-card mb-3" },
      h("p", { className: "text-sm", style: { lineHeight: 1.5, marginBottom: 10 } }, "Sign in to share this wallet with SpendLens, so you can actually spend it from your main money app."),
      h("button", { className: "btn btn-primary btn-sm", onClick: signInGoogle }, "Connect with SpendLens")),

    h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }, className: "mb-3" },
      h("div", { className: "stat-card" },
        h("p", { className: "stat-value", style: { color: "#6B8E55" } }, "$", earnedTotal.toFixed(0)),
        h("p", { className: "stat-label" }, "Earned all-time")),
      h("div", { className: "stat-card" },
        h("p", { className: "stat-value", style: { color: "var(--text2)" } }, "$", spentTotal.toFixed(0)),
        h("p", { className: "stat-label" }, "Spent all-time"))),

    h("div", { className: "divider-label" }, h("span", null, "Recent activity")),
    walletSyncing && h("p", { className: "text-xs text-muted text-center mb-2 loading-pulse" }, "Syncing with SpendLens…"),
    walletTxns.length === 0 ? h("div", { className: "card text-center", style: { padding: 36 } },
      h("p", { className: "text-muted" }, "No activity yet."),
      h("p", { className: "text-sm text-muted mt-1" }, "Finish a workout to earn your first reward."))
    : walletTxns.slice(0, 50).map(t => h("div", { key: t.id, className: `wallet-txn ${t.amount < 0 ? "spend" : ""}` },
        h("div", { className: "ico" }, h(Icon, { name: SOURCE_ICONS[t.source] || "plus", size: 16 })),
        h("div", { style: { flex: 1, minWidth: 0 } },
          h("p", { style: { fontSize: 14, fontWeight: 500 } }, SOURCE_LABELS[t.source] || t.source),
          t.description && h("p", { className: "text-xs text-muted", style: { marginTop: 2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" } }, t.description)),
        h("div", { className: "text-right" },
          h("p", { className: `wallet-amt ${t.amount >= 0 ? "pos" : "neg"}` }, (t.amount >= 0 ? "+$" : "−$") + Math.abs(t.amount).toFixed(2)),
          h("p", { className: "text-xs text-muted mt-1" }, (t.occurred_at || "").slice(0, 10)))))
  );
}

function WalletInfoModal() {
  return h("div", null,
    h(Kicker, null, "How rewards work"),
    h("h2", { className: "mb-3", style: { fontStyle: "italic" } }, "Your guilt-free fund"),
    h("p", { className: "text-sm mb-3", style: { lineHeight: 1.6, color: "var(--text2)" } }, "Each time you finish a workout, hit a streak day, complete your weekly goal, set a new personal record, or log cardio — REPS deposits a small reward into a shared wallet."),
    h("p", { className: "text-sm mb-3", style: { lineHeight: 1.6, color: "var(--text2)" } }, "If you sign in with Google, this wallet is shared with SpendLens. The balance shows up there as guilt-free money — set it aside, spend it on something that feels good, knowing you've already earned it."),
    h("p", { className: "text-sm", style: { lineHeight: 1.6, color: "var(--text2)" } }, "Tune the amounts in Settings if you want larger or smaller rewards."));
}

function SpendWalletModal({ balance, authUser, signInGoogle, onConfirm }) {
  return h("div", null,
    h(Kicker, null, "Spend"),
    h("h2", { className: "mb-2", style: { fontStyle: "italic" } }, "Treat yourself"),
    h("p", { className: "text-sm text-muted mb-3" }, "You have ", h("strong", { style: { color: "var(--accent-deep)" } }, "$" + balance.toFixed(2)), " to spend guilt-free."),
    authUser ? h("div", null,
      h("p", { className: "text-sm mb-3", style: { lineHeight: 1.5 } }, "Open SpendLens to spend from this wallet. The balance is already mirrored there under your guilt-free fund."),
      h("a", { className: "btn btn-primary btn-full", href: "https://aspurand.github.io/Spendlens/", target: "_blank", rel: "noopener" }, "Open SpendLens"))
    : h("div", null,
      h("p", { className: "text-sm mb-3" }, "Sign in to share this wallet with SpendLens, so you can spend it from your main money app."),
      h("button", { className: "btn btn-primary btn-full", onClick: signInGoogle }, "Connect with SpendLens")));
}

function RewardSummaryModal({ earned, total, onClose }) {
  return h("div", { className: "text-center" },
    h(Kicker, null, "Practice complete"),
    h("h2", { className: "mb-2", style: { fontStyle: "italic" } }, "Well done."),
    h("p", { style: { fontFamily: "var(--font-display)", fontSize: 56, fontWeight: 500, color: "var(--accent-deep)", letterSpacing: -2, margin: "12px 0" } }, "+$" + total.toFixed(2)),
    h("p", { className: "text-sm text-muted mb-3" }, "Added to your guilt-free wallet."),
    h("div", { className: "flex flex-col gap-1 mb-3", style: { textAlign: "left" } },
      earned.map((e, i) => h("div", { key: i, className: "flex items-center gap-2", style: { padding: "8px 12px", background: "var(--surface2)", borderRadius: 10 } },
        h(Icon, { name: SOURCE_ICONS[e.source] || "plus", size: 14, color: "var(--accent)" }),
        h("span", { style: { flex: 1, fontSize: 13 } }, SOURCE_LABELS[e.source] + (e.description ? " · " + e.description : "")),
        h("span", { className: "wallet-amt pos" }, "+$" + e.amount.toFixed(2))))),
    h("button", { className: "btn btn-primary btn-full", onClick: onClose }, "Continue"));
}

// ═════════════════════════════════════════════════════════════════
// Mount
// ═════════════════════════════════════════════════════════════════
ReactDOM.createRoot(document.getElementById("app")).render(h(App));

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
