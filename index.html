// ═════════════════════════════════════════════════════════════════
// Cardio modal
// ═════════════════════════════════════════════════════════════════
function CardioModal({ onSave }) {
  const [type, setType] = useState("Running");
  const [duration, setDuration] = useState("30");
  const [distance, setDistance] = useState("");
  const [intensity, setIntensity] = useState("moderate");
  const calcCals = () => { const d = +duration || 0; return Math.round(d * (intensity === "light" ? 5 : intensity === "moderate" ? 8 : 11)); };

  return h("div", null,
    h(Kicker, null, "LOG THE RUN"),
    h("h2", { className: "mb-3" }, "CARDIO SESSION"),
    h("p", { className: "label mb-2" }, "ACTIVITY"),
    h("div", { className: "flex gap-2 mb-3 flex-wrap" },
      CARDIO_TYPES.map(t => h("button", { key: t, className: `chip ${type === t ? "active" : ""}`, onClick: () => setType(t) }, t.toUpperCase()))),
    h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }, className: "mb-3" },
      h("div", null, h("p", { className: "label" }, "DURATION (MIN)"), h("input", { className: "input", type: "number", value: duration, onChange: e => setDuration(e.target.value) })),
      h("div", null, h("p", { className: "label" }, "DISTANCE (MI)"), h("input", { className: "input", type: "number", placeholder: "OPTIONAL", step: "0.1", value: distance, onChange: e => setDistance(e.target.value) }))),
    h("p", { className: "label mb-2" }, "INTENSITY"),
    h("div", { className: "flex gap-2 mb-3" },
      ["light","moderate","intense"].map(i => h("button", { key: i, className: `chip ${intensity === i ? "active" : ""}`, style: { flex: 1, justifyContent: "center", padding: 12 }, onClick: () => setIntensity(i) }, i.toUpperCase()))),
    h("div", { className: "card card-iron text-center", style: { padding: 18 } },
      h("p", { className: "label" }, "EST. CALORIES"),
      h("p", { style: { fontFamily: "var(--font-display)", fontSize: 42, fontWeight: 700, color: "var(--accent)", lineHeight: 1, letterSpacing: -1 } }, "~" + calcCals())),
    h("button", { className: "btn btn-green btn-full mt-3", style: { padding: 14 }, onClick: () => onSave({ type, duration: +duration, distance: distance ? +distance : null, intensity, calories: calcCals() }) },
      h(Icon, { name: "check", size: 16, color: "#0A1F00", strokeWidth: 3 }), " LOG IT"));
}

// ═════════════════════════════════════════════════════════════════
// Settings
// ═════════════════════════════════════════════════════════════════
function SettingsPage({ profile, setProfile, darkMode, setDarkMode, onReset, workouts, schedule, setSchedule, setModal }) {
  const openScheduleEditor = () => setModal(h(ScheduleEditorModal, { workouts, schedule, onSave: (s) => { setSchedule(s); setModal(null); } }));
  const exportData = () => {
    const payload = {
      version: SCHEMA_VERSION, exportedAt: new Date().toISOString(),
      profile, workouts, schedule, darkMode,
      bodyStats: S.get("bodyStats", []), cardioLogs: S.get("cardioLogs", []),
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `reps-export-${todayStr()}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  return h("div", { className: "page" },
    h(Kicker, null, "YOUR LOADOUT"),
    h("h1", { className: "mb-4", style: { fontSize: 44 } }, "GEAR"),
    h("div", { className: "card card-iron" },
      h("h3", { className: "mb-3" }, "PROFILE"),
      h("p", { className: "label" }, "NAME"),
      h("input", { className: "input mb-3", value: profile.name, onChange: e => setProfile({...profile, name: e.target.value}) }),
      h("p", { className: "label" }, "GOAL"),
      h("div", { className: "flex gap-2 mb-3 flex-wrap" },
        GOALS.map(g => h("button", { key: g, className: `chip ${profile.goal === g ? "active" : ""}`, onClick: () => setProfile({...profile, goal: g}) }, g.toUpperCase()))),
      h("p", { className: "label" }, "SETTING"),
      h("div", { className: "flex gap-2 mb-3" },
        SETTINGS_OPTIONS.map(s => h("button", { key: s, className: `chip ${profile.setting === s ? "active" : ""}`, onClick: () => setProfile({...profile, setting: s}) }, s.toUpperCase()))),
      h("p", { className: "label" }, "ARSENAL"),
      h("div", { className: "flex gap-1 flex-wrap" },
        Object.entries(EQUIPMENT_LABELS).map(([k, v]) => h("button", { key: k, className: `chip chip-sm ${(profile.equipment||[]).includes(k) ? "active" : ""}`, onClick: () => {
          const eq = profile.equipment || [];
          setProfile({...profile, equipment: eq.includes(k) ? eq.filter(x => x !== k) : [...eq, k]});
        } }, v.toUpperCase())))),
    h("div", { className: "card" },
      h("div", { className: "flex justify-between items-center" },
        h("div", null,
          h("h3", null, "WEEKLY SCHEDULE"),
          h("p", { className: "mono text-xs text-muted mt-1", style: { letterSpacing: 1 } }, "ASSIGN WORKOUTS TO DAYS")),
        h("button", { className: "btn btn-secondary btn-sm", onClick: openScheduleEditor }, h(Icon, { name: "calendar", size: 14 }), " EDIT"))),
    h("div", { className: "card" },
      h("div", { className: "flex justify-between items-center" },
        h("div", { className: "flex items-center gap-2" },
          h(Icon, { name: darkMode ? "moon" : "sun", size: 18, color: "var(--accent)" }),
          h("span", { style: { fontFamily: "var(--font-display)", fontSize: 15, letterSpacing: 1, textTransform: "uppercase", fontWeight: 600 } }, "DARK MODE")),
        h("button", { className: "btn btn-secondary btn-sm", onClick: () => setDarkMode(!darkMode), style: { minWidth: 70 } }, darkMode ? "ON" : "OFF"))),
    h("div", { className: "card" },
      h("h3", { className: "mb-2" }, "DATA"),
      h("button", { className: "btn btn-secondary btn-full", onClick: exportData },
        h(Icon, { name: "copy", size: 14 }), " EXPORT MY DATA"),
      h("p", { className: "mono text-xs text-muted mt-2", style: { letterSpacing: 1 } }, "DOWNLOADS JSON BACKUP")),
    h("div", { className: "card" },
      h("h3", { className: "mb-2" }, "ABOUT"),
      h("p", { className: "mono", style: { fontSize: 11, color: "var(--text3)", letterSpacing: 1 } }, "REPS v2.0 · PLUS ULTRA EDITION"),
      h("p", { className: "text-sm text-muted mt-2", style: { lineHeight: 1.5 } }, "Every rep is a step. Every day is the arc.")),
    h("div", { className: "card card-hot text-center", style: { padding: 18 } },
      h("p", { style: { fontFamily: "var(--font-display)", fontSize: 14, letterSpacing: 2, textTransform: "uppercase", fontWeight: 600, color: "var(--accent)" } }, "INSTALL TO HOME SCREEN"),
      h("p", { className: "mono", style: { fontSize: 10, color: "var(--text2)", letterSpacing: 1, marginTop: 8 } }, "iOS: SHARE → ADD TO HOME SCREEN"),
      h("p", { className: "mono", style: { fontSize: 10, color: "var(--text2)", letterSpacing: 1, marginTop: 2 } }, "ANDROID: MENU → INSTALL APP")),
    h("button", { className: "btn btn-secondary btn-full mt-2", style: { color: "var(--red)", borderColor: "var(--red)" }, onClick: () => { if (confirm("WIPE ALL DATA? NO TAKE-BACKS.")) onReset(); } }, "RESET ALL DATA"));
}

// ═════════════════════════════════════════════════════════════════
// Schedule Editor
// ═════════════════════════════════════════════════════════════════
function ScheduleEditorModal({ workouts, schedule, onSave }) {
  const [edit, setEdit] = useState({ ...schedule });
  const setDay = (day, wid) => setEdit(prev => ({ ...prev, [day]: wid }));

  return h("div", null,
    h(Kicker, null, "BATTLE PLAN"),
    h("h2", { className: "mb-3" }, "WEEKLY SCHEDULE"),
    h("p", { className: "text-sm text-muted mb-3" }, "Tap a workout to assign it. Choose \"REST\" for off days."),
    DAYS.map(d => h("div", { key: d, className: "card card-tight" },
      h("p", { style: { fontFamily: "var(--font-display)", fontSize: 14, fontWeight: 600, letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 } }, d),
      h("div", { className: "flex flex-wrap gap-1" },
        h("button", { className: `chip chip-sm ${!edit[d] ? "active" : ""}`, onClick: () => setDay(d, null) }, "REST"),
        workouts.map(w => h("button", { key: w.id, className: `chip chip-sm ${edit[d] === w.id ? "active" : ""}`, onClick: () => setDay(d, w.id) }, w.name.toUpperCase()))))),
    h("button", { className: "btn btn-primary btn-full mt-3", style: { padding: 14 }, onClick: () => onSave(edit) },
      h(Icon, { name: "check", size: 16, color: "#fff", strokeWidth: 3 }), " SAVE SCHEDULE"));
}
